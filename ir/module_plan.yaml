modules:
  - name: level_data
    responsibility: static map and spawn positions
    depends_on: []

  - name: level_generator
    responsibility: |
      Demo-only level builder (specs/15). Owns DemoLevelKind enum and a
      pure `build(kind) -> Level` function. Returns the same Level type
      that level_data::build_default returns; the runtime cannot tell which
      builder produced a given Level. NOT consumed by any per-frame path
      — only main.rs (once at startup, when --autopilot scenario.level is
      Some) and autopilot's Scenario type (the DemoLevelKind enum is
      referenced as Scenario.level: Option<DemoLevelKind>).
    depends_on: [level_data]

  - name: player_state
    responsibility: player position, direction, health if needed
    depends_on: [level_data]

  - name: input_controller
    responsibility: translate input into player actions
    depends_on: [player_state]

  - name: visual_effects
    responsibility: |
      transient combat feedback entities — muzzle flashes, tracers, wall puffs,
      blood splats, enemy pain flashes, player damage tint, enemy death fade and
      persistent corpse markers. Owns spawn API and per-frame lifetime tick;
      drawing is delegated to renderer. See specs/40_visual_feedback.md.
    depends_on: [level_data, player_state]

  - name: weapon_system
    responsibility: simple attack behavior; spawns muzzle flash, tracer, and impact effect on each shot
    depends_on: [player_state, visual_effects]

  - name: enemy_logic
    responsibility: simple enemy update and chase behavior; raises pain-flash and death visuals on state transitions
    depends_on: [level_data, player_state, visual_effects]

  - name: presentation
    responsibility: minimal rendering or textual visualization
    depends_on: [player_state, enemy_logic]

  - name: renderer
    responsibility: low-level rendering helper; reads visual_effects to draw transient effects, corpses, and damage tint overlay
    depends_on: [presentation, visual_effects]

  - name: game_loop
    responsibility: update and frame progression; owns visual_effects list and ticks lifetimes each frame
    depends_on:
      - level_data
      - player_state
      - enemy_logic
      - weapon_system
      - input_controller
      - visual_effects

  - name: autopilot
    responsibility: |
      Spec-driven scenario interpreter with bot AI. Per-frame primitives
      (parse_scenario, bot_step, BotState, BotProgress, Scenario, Objective)
      are always compiled and consumed by main.rs in --autopilot mode
      (specs/35). The batch test runner (run_scenario, run_all_scenarios)
      is #[cfg(test)]-gated. Scenario.level: Option<DemoLevelKind> picks
      a generated demo level when set (specs/15); main.rs decides whether
      to call level_generator::build or level_data::build_default based on
      that field.
    depends_on:
      - game_loop
      - input_controller
      - level_data
      - level_generator
      - player_state
      - enemy_logic

  - name: frame_recorder
    responsibility: |
      Optional raw-framebuffer recorder used only when main.rs is invoked
      with --record-frames <path> (specs/35). Opens a file, appends each
      framebuffer (BGRA u32s, native endian) per frame. No encoding —
      ffmpeg consumes the raw stream downstream.
    depends_on:
      - presentation

  - name: main
    responsibility: |
      Binary entry point (generated/game/src/main.rs). Parses CLI flags
      (--autopilot, --record-frames), declares `mod <name>;` for every
      other module, constructs GameState, owns the main render loop.
      Not gameplay logic — but contracted in ir/module_contracts.yaml
      § main_cli, so spec edits that name main.rs (new CLI flag, new
      module wiring) MUST regenerate it. Listing every other module in
      depends_on makes partial_regen.py's reverse-dep closure pull main
      in whenever any module is touched. validate_specs.py asserts the
      list stays complete.
    depends_on:
      - level_data
      - level_generator
      - player_state
      - input_controller
      - visual_effects
      - weapon_system
      - enemy_logic
      - presentation
      - renderer
      - game_loop
      - autopilot
      - frame_recorder
