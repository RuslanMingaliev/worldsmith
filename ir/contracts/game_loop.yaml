# game_loop module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: game_loop
file: src/game_loop.rs
depends_on:
  - level_data
  - player_state
  - enemy_logic
  - weapon_system
  - input_controller
  - visual_effects
public_types:
  - name: ArmorTier
    note: "Consumed; see shared_types.ArmorTier. game_loop's per-frame pickup-check step translates PickupKind::ArmorGreen/ArmorBlue to ArmorTier::Green/Blue at the call site to player_state::take_armor_pickup (frame_update_order)."

  - name: GameState
    definition: |
      pub struct GameState {
          pub level: Level,
          pub player: Player,
          pub enemies: Vec<Enemy>,
          pub fx: VisualEffects,
          pub running: bool,           // false -> main loop exits
          pub won: bool,               // true once player reaches exit
          pub elapsed: f32,            // total seconds since game start; ticked by += dt in update.
          pub game_over_at: Option<f32>, // timestamp (in `elapsed` units) at which the game-over state was reached. None until the player wins or dies. Drives the post-game-over hold (specs/20 § Game Over Flow + specs/25 § Visual GAME_OVER_HOLD_SEC).
          #[cfg(test)]
          pub frames: u64,             // tick counter; only autopilot reads this
      }
public_constants: []
public_methods:
  - signature: "pub fn new(level: Level) -> GameState"
    notes: |
      Constructs GameState from a caller-supplied Level. Caller is
      responsible for choosing the level (default vs. demo); this
      constructor is level-agnostic.
        player = Player::new(level.player_spawn,
                             player_state::WEAPON_RNG_SEED)
        enemies = level.enemy_spawns.iter()
                      .map(|s| Enemy::new(s.pos, s.archetype))
                      .collect()
        // EnemySpawn carries the archetype tag (specs/25 § Enemy);
        // Enemy::new looks up per-archetype constants (max_health,
        // attack_sequence_sec) via the module-private archetype_stats
        // helper in enemy_logic.
      WEAPON_RNG_SEED is passed unconditionally — both interactive and
      --autopilot modes get deterministic weapon RNG. Specs/35 §
      Determinism permits a wall-clock seed in interactive mode but does
      not require one; the always-fixed-seed shape avoids threading a
      time source through game_loop::new. Future Coder threading a time
      source picks up the second argument as the hook
      (player_state contract § Player.weapon_rng).
        fx = VisualEffects::new()
        running = true; won = false; (#[cfg(test)] frames = 0)
        level (moved into GameState as state.level)
      Per specs/15 § game_loop::new constructor signature, main.rs
      picks the level via:
        let level = match autopilot_scenario.as_ref().and_then(|s| s.level) {
            Some(kind) => level_generator::build(kind),
            None       => level_data::build_default(),
        };
        let mut game = game_loop::new(level);
      Interactive play (no --autopilot) always passes
      level_data::build_default(). The generator is never called from
      inside game_loop or any other per-frame path.
  - signature: "pub fn update(state: &mut GameState, input: &InputState, dt: f32)"
    notes: |
      ONE per-frame tick. Order is pinned by frame_update_order
      below. Both main.rs and autopilot call update(...). Caller
      (main.rs) handles minifb redraw and per-frame timing; caller
      (autopilot) drives a fixed dt = 1.0/60.0.
cross_module_borrows:
  - "Owns Level, Player, Enemies, VisualEffects -- all by value."
  - "Borrows &InputState for the duration of update()."
notes: |
  The `frames` field is `#[cfg(test)]`-gated because its only consumer
  is game_loop's own `test_frames_increment` unit test. It is NOT
  consumed by autopilot's `--autopilot` run loop (which uses its own
  module-private `BotState.frame_count` keyed off `BOT_MAX_FRAMES`,
  see autopilot.yaml § BotState) or by the autopilot field-value
  resolver (specs/30 § Implementation Status lists `game.frames` under
  "Not yet implemented" — see autopilot.yaml § Field-value resolver).
  Per spec/80 § API Surface "no dead pub exports", a release-build
  symbol with no consumer must not be public; the `#[cfg(test)]` gate
  keeps the field available for the unit test without releasing it.
  Corrected 2026-05-14 release reconcile after the prior note
  incorrectly attributed the consumer to a `game.frames` assertion
  field that the resolver does not implement.
