# autopilot module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: autopilot
file: src/autopilot.rs
cfg_test_only_module: false
depends_on:
  - game_loop
  - input_controller
  - level_data
  - level_generator
  - player_state
  - enemy_logic
public_types:
  # ---- Always compiled (released; consumed by main.rs in --autopilot mode)
  - name: Scenario
    definition: |
      #[derive(Debug, serde::Deserialize)]
      pub struct Scenario {
          pub scenario: String,
          pub description: String,
          #[serde(default)]
          pub level: Option<crate::level_generator::DemoLevelKind>,
          pub objectives: Vec<Objective>,
          #[serde(default)]
          pub assertions: Vec<Assertion>,
      }
    cfg_test_only: false
    notes: |
      `level` (specs/15) is optional. Absent => caller (main.rs)
      uses level_data::build_default(). Present => caller calls
      level_generator::build(kind). The serde rename_all attribute
      on DemoLevelKind handles snake_case YAML names
      (e.g. `local_chase_obstacle`). Unknown names yield a
      serde_yaml deserialization error which `parse_scenario`'s
      `.expect("valid scenario YAML")` propagates as a panic with
      a clear message — matching the existing parse error handling
      rule in specs/30 § Execution Rules.
  - name: Objective
    definition: |
      #[derive(Debug, serde::Deserialize)]
      pub enum Objective {
          Kill(String),
          Reach(String),
          Approach(String),
          Wait(u32),
      }
    cfg_test_only: false
    notes: |
      Implementation choice deferred to Coder: the YAML files in
      tests/ use a single-key-mapping form
      ("- kill: enemy"); the Coder may use serde_yaml::Value
      inspection or a custom Deserialize impl. The public *shape*
      (kill/reach/approach/wait) is what must be stable.
  - name: BotState
    definition: |
      // Opaque per-bot working state (objective index, stuck counter,
      // strafe direction, RNG seed for the bot's own randomness).
      // Construct once per scenario via BotState::new() and pass &mut
      // to bot_step each frame. Coder owns the field layout; only
      // the constructor is contracted.
      pub struct BotState { /* ... */ }
    cfg_test_only: false
  - name: BotProgress
    definition: |
      #[derive(Debug, Clone)]
      pub enum BotProgress {
          Running,
          AllObjectivesComplete,
          Failed(String),
      }
    cfg_test_only: false
    notes: |
      Returned alongside InputState from bot_step each frame.
      main.rs (--autopilot mode) breaks out of its loop when this
      is anything other than Running. The test runner uses the
      same signal.

  # ---- #[cfg(test)] only (offline batch driver)
  - name: Assertion
    definition: |
      #[derive(Debug)]
      pub struct Assertion {
          pub field: String,    // "player.alive", "game.won", ...
          pub op: AssertOp,     // Eq | Gt | Lt | Gte | Lte
          pub value: AssertValue,
      }
    cfg_test_only: true
    notes: |
      Assertion is #[cfg(test)]-gated even though it appears as
      Scenario::assertions; the Scenario type is always-compiled
      but the assertions field is `#[serde(default)] Vec<Assertion>`
      and Assertion's body lives behind cfg(test). Release builds
      deserialize an empty Vec and never inspect it. This keeps the
      released surface minimal while letting the same Scenario type
      serve both paths.

      Coder implementation note: define Assertion as a plain struct
      with cfg(test) gating; for release-build deserialization of
      the `assertions:` YAML key, either (a) use #[serde(default,
      skip_deserializing)] in release builds, or (b) define an
      empty stub Assertion in release. (a) is simpler.
  - name: AssertOp
    definition: |
      #[derive(Debug, Clone, Copy, PartialEq)]
      pub enum AssertOp { Eq, Gt, Lt, Gte, Lte }
    cfg_test_only: true
  - name: AssertValue
    definition: |
      #[derive(Debug)]
      pub enum AssertValue { Bool(bool), Number(f32) }
    cfg_test_only: true
  - name: ScenarioResult
    definition: |
      pub struct ScenarioResult {
          pub passed: bool,
          pub failures: Vec<String>,
      }
    cfg_test_only: true
public_constants:
  # Always-compiled bot tunables (consumed by bot_step in both paths).
  # BOT_FRAME_RATE is module-private (no cross-module consumer) per spec/80
  # § API Surface "no dead pub exports" — only BOT_FRAME_TIME (which is
  # 1.0 / BOT_FRAME_RATE) crosses the module boundary, consumed by main.rs
  # in --autopilot mode. Reconciled during reconcile pass.
  - { name: BOT_FRAME_TIME,         type: f32, value: "0.01666667", source: "specs/30 § Execution Rules (1/60)", cfg_test_only: false }
  - { name: BOT_MAX_FRAMES,         type: u32, value: "3600",   source: "specs/30 § Execution Rules (60 sec)", cfg_test_only: false }
  - { name: BOT_REACH_DISTANCE,     type: f32, value: "1.0",    source: "specs/30 § Objectives (reach)", cfg_test_only: false }
  - { name: BOT_APPROACH_DISTANCE,  type: f32, value: "8.0",    source: "specs/30 § Objectives (approach)", cfg_test_only: false }
  - { name: BOT_STUCK_FRAMES,       type: u32, value: "30",     source: "specs/30 § Stuck Detection", cfg_test_only: false }
  - { name: BOT_REVERSE_STRAFE_FRAMES, type: u32, value: "60",  source: "specs/30 § Stuck Detection", cfg_test_only: false }
  - { name: BOT_FACING_THRESHOLD,    type: f32, value: "0.3",    source: "specs/25 § Autopilot (Generation default — 'roughly facing' threshold; ~17 deg; captured during reconcile)", cfg_test_only: false }
  - { name: BOT_TURN_THRESHOLD,      type: f32, value: "0.05",   source: "specs/25 § Autopilot (Generation default — below this angular delta the bot emits turn=0; ~3 deg; captured during reconcile)", cfg_test_only: false }
  - { name: BOT_RNG_SEED,           type: u64, value: "0xC0FFEE", source: "specs/35 § Determinism (Generation default — Coder may pick any fixed constant; record in work/decisions.md)", cfg_test_only: false }
public_methods:
  # ---- Always compiled
  - signature: "pub fn parse_scenario(yaml: &str) -> Scenario"
    notes: |
      serde_yaml::from_str(yaml).expect('valid scenario YAML').
      Used by main.rs (--autopilot) and by run_all_scenarios test.
    cfg_test_only: false
  - signature: |
      impl BotState {
          pub fn new() -> Self;
      }
    notes: |
      Initial bot state: current objective index = 0, stuck counter = 0,
      strafe direction = +1, RNG seeded from BOT_RNG_SEED.
    cfg_test_only: false
  - signature: |
      pub fn bot_step(
          game: &GameState,
          scenario: &Scenario,
          bot: &mut BotState,
      ) -> (InputState, BotProgress)
    notes: |
      Per-frame primitive. Decides the bot's next InputState given the
      current GameState and the active objective from the Scenario.
      Returns (input, progress). Progress transitions:
        - Running while there is still an unmet objective and
          bot.frame_count < BOT_MAX_FRAMES and game.player.alive.
        - AllObjectivesComplete when the last objective's success
          condition is met.
        - Failed("timeout") when frame_count exceeds BOT_MAX_FRAMES.
        - Failed("player_died") when !game.player.alive (relevant for
          scenarios that don't expect death).
      Bot RNG (used for stuck-detection strafe direction picks etc.)
      is module-private and seeded from BOT_RNG_SEED in BotState::new(),
      so two runs against the same Scenario + same GameState seed
      produce identical (input, progress) sequences. This is the
      determinism guarantee specs/35 § Determinism relies on.
    cfg_test_only: false

  # ---- #[cfg(test)] only
  - signature: "pub fn run_scenario(scenario: &Scenario) -> ScenarioResult"
    notes: |
      Test-only batch driver. Pseudocode:
        1. state = GameState::new();
        2. bot = BotState::new();
        3. loop:
             (input, progress) = bot_step(&state, scenario, &mut bot);
             game_loop::update(&mut state, &input, BOT_FRAME_TIME);
             if !matches!(progress, BotProgress::Running): break;
        4. for assertion in &scenario.assertions:
             check_assertion(&state, assertion);
        5. return ScenarioResult { passed, failures }.
      Implemented in terms of bot_step so the test path and the
      --autopilot path share the same bot logic.
    cfg_test_only: true
  - signature: |
      #[test]
      fn run_all_scenarios()
    notes: |
      Iterates `tests/**/*.yaml`, parses each scenario, runs it,
      asserts ScenarioResult.passed == true, panics with the first
      failure message otherwise. This is the entry point cargo test
      discovers.
    cfg_test_only: true
cross_module_borrows:
  - "&GameState (read-only in bot_step; &mut in run_scenario)"
  - "Constructs InputState by value each frame"
notes: |
  Module-level `#[cfg(test)]` gate is REMOVED (was previously
  `#[cfg(test)] mod autopilot;` in main.rs). The autopilot module
  is now always compiled; individual symbols inside use per-symbol
  `#[cfg(test)]` gates per the cfg_test_only field on each entry
  above. `mod autopilot;` in main.rs has no cfg attribute.

  Consumers:
    - main.rs: parse_scenario, BotState, BotProgress, bot_step
    - run_all_scenarios test: parse_scenario, run_scenario,
      ScenarioResult, all assertion types

  Dependency on serde/serde_yaml moves from [dev-dependencies] to
  [dependencies] (specs/80 § Dependencies). game_ir.yaml /
  Cargo.toml carry the manifest change.
