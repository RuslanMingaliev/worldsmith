# autopilot module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: autopilot
file: src/autopilot.rs
cfg_test_only_module: false
depends_on:
  - game_loop
  - input_controller
  - level_data
  - level_generator
  - player_state
  - enemy_logic
public_types:
  # ---- Always compiled (released; consumed by main.rs in --autopilot mode)
  - name: Scenario
    definition: |
      #[derive(Debug, serde::Deserialize)]
      pub struct Scenario {
          // Only consumed by the cfg(test) batch driver
          // (run_all_scenarios eprintln). serde silently ignores
          // YAML's `description:` key in non-test (no struct field).
          #[cfg(test)]
          pub scenario: String,
          #[serde(default)]
          pub level: Option<crate::level_generator::DemoLevelKind>,
          pub objectives: Vec<Objective>,
          #[cfg(test)]
          #[serde(default)]
          pub assertions: Vec<Assertion>,
      }
    cfg_test_only: false
    notes: |
      `level` (specs/15) is optional. Absent => caller (main.rs)
      uses level_data::build_default(). Present => caller calls
      level_generator::build(kind). The serde rename_all attribute
      on DemoLevelKind handles snake_case YAML names
      (e.g. `local_chase_obstacle`, `shotgun_standoff`). Unknown
      names yield a serde_yaml deserialization error which
      `parse_scenario`'s `.expect("valid scenario YAML")` propagates
      as a panic with a clear message — matching the existing parse
      error handling rule in specs/30 § Execution Rules. The
      shotgun_standoff variant was added in the 2026-05-13 combat
      slice 2 alongside the ShotgunTrooper archetype; no signature
      or struct shape change is required here since the field type
      is already `Option<DemoLevelKind>`.

      `scenario` (the test-name string) and `assertions` are
      #[cfg(test)]-gated because the only consumers are the test
      batch driver (run_all_scenarios prints scenario.scenario;
      run_scenario reads scenario.assertions). Spec/80 § API Surface
      "no dead pub exports" mandates the gate. The YAML's
      `description:` key has no in-crate consumer at all (test or
      otherwise) and is dropped from the struct entirely — serde
      ignores unknown YAML keys by default. This replaces the prior
      regen's `#[allow(dead_code)]` mask on the whole struct, which
      was a spec/80 violation flagged in 2026-05-09 reconcile.
  - name: Objective
    definition: |
      #[derive(Debug)]
      pub enum Objective {
          Kill(String),
          Reach(String),
          Approach(String),
          Wait(u32),
      }
    cfg_test_only: false
    notes: |
      The YAML files in tests/ use the externally-tagged single-key-map
      form ("- kill: enemy"). serde_yaml 0.9 (the pinned version --
      see specs/80 § Dependencies) does NOT accept the `#[derive(
      serde::Deserialize)] #[serde(rename_all="snake_case")]` shape
      for this enum syntax -- v0.9 expects YAML `!tag` notation for
      externally-tagged enums, not the prose-style map. The Coder MUST
      hand-roll an `impl<'de> Deserialize<'de> for Objective` via a
      MapAccess Visitor that pops the single key and dispatches on it.
      Captured 2026-05-12 release reconcile after the Coder report's
      Reconciler Parking-Lot Item #2 surfaced this. Future serde_yaml
      bumps (≥1.0 if/when released) may restore the derive path; revisit
      then. The public *shape* (kill/reach/approach/wait) is what must
      be stable regardless of which path is taken.
  - name: BotState
    definition: |
      // Opaque per-bot working state (objective index, stuck counter,
      // strafe direction, RNG seed for the bot's own randomness).
      // Construct once per scenario via BotState::new() and pass &mut
      // to bot_step each frame. Coder owns the field layout; only
      // the constructor is contracted.
      pub struct BotState { /* ... */ }
    cfg_test_only: false
  - name: BotProgress
    definition: |
      #[derive(Debug, Clone)]
      pub enum BotProgress {
          Running,
          AllObjectivesComplete,
          Failed(String),
      }
    cfg_test_only: false
    notes: |
      Returned alongside InputState from bot_step each frame.
      main.rs (--autopilot mode) breaks out of its loop when this
      is anything other than Running. The test runner uses the
      same signal.

  # ---- #[cfg(test)] only (offline batch driver)
  - name: Assertion
    definition: |
      #[derive(Debug)]
      pub struct Assertion {
          pub field: String,    // "player.alive", "game.won", ...
          pub op: AssertOp,     // Eq | Gt | Lt | Gte | Lte
          pub value: AssertValue,
      }
    cfg_test_only: true
    notes: |
      Assertion, AssertOp, AssertValue, and the custom
      `impl Deserialize for Assertion` (plus the `parse_assert_value`
      helper) all live behind a single `#[cfg(test)]` gate. The
      Scenario type is always-compiled but its `assertions` FIELD is
      ALSO `#[cfg(test)]`-gated — release builds simply do not have
      an `assertions` field on Scenario, and serde silently ignores
      the YAML's `assertions:` key (default behavior; no
      `deny_unknown_fields`). This avoids `#[serde(skip_deserializing)]`
      gymnastics and keeps the released surface minimal.

      Coder implementation note: gate Assertion, AssertOp,
      AssertValue, the Deserialize impl, and parse_assert_value with
      `#[cfg(test)]`. Gate Scenario.assertions and Scenario.scenario
      fields with `#[cfg(test)]` as well (Scenario.scenario is the
      test-name string consumed by run_all_scenarios eprintln). Drop
      Scenario.description from the struct entirely — no consumer
      anywhere; serde drops the YAML key. This was the
      2026-05-09 reconcile fix replacing prior `#[allow(dead_code)]`
      masks on Scenario / Assertion / AssertValue (spec/80 violation).
  - name: AssertOp
    definition: |
      #[derive(Debug, Clone, Copy, PartialEq)]
      pub enum AssertOp { Eq, Gt, Lt, Gte, Lte }
    cfg_test_only: true
  - name: AssertValue
    definition: |
      #[derive(Debug)]
      pub enum AssertValue { Bool(bool), Number(f32) }
    cfg_test_only: true
  - name: ScenarioResult
    definition: |
      pub struct ScenarioResult {
          pub passed: bool,
          pub failures: Vec<String>,
      }
    cfg_test_only: true
public_constants:
  # Always-compiled bot tunables (consumed by bot_step in both paths).
  # BOT_FRAME_RATE is module-private (no cross-module consumer) per spec/80
  # § API Surface "no dead pub exports" — only BOT_FRAME_TIME (which is
  # 1.0 / BOT_FRAME_RATE) crosses the module boundary, consumed by main.rs
  # in --autopilot mode. Reconciled during reconcile pass.
  - { name: BOT_FRAME_TIME,         type: f32, value: "0.01666667", source: "specs/30 § Execution Rules (1/60)", cfg_test_only: false }
  - { name: BOT_MAX_FRAMES,         type: u32, value: "18000",  source: "specs/25 § Autopilot — 300 game-seconds at 60 FPS, raised from 3600 during 2026-05-08 reconcile to accommodate two-enemy fixtures across the central divider", cfg_test_only: false }
  - { name: BOT_REACH_DISTANCE,     type: f32, value: "1.0",    source: "specs/30 § Objectives (reach)", cfg_test_only: false }
  - { name: BOT_APPROACH_DISTANCE,  type: f32, value: "8.0",    source: "specs/30 § Objectives (approach)", cfg_test_only: false }
  - { name: BOT_STUCK_FRAMES,       type: u32, value: "30",     source: "specs/30 § Stuck Detection", cfg_test_only: false }
  - { name: BOT_REVERSE_STRAFE_FRAMES, type: u32, value: "60",  source: "specs/30 § Stuck Detection", cfg_test_only: false }
  - { name: BOT_FACING_THRESHOLD,    type: f32, value: "0.3",    source: "specs/25 § Autopilot (Generation default — 'roughly facing' threshold; ~17 deg; captured during reconcile)", cfg_test_only: false }
  - { name: BOT_TURN_THRESHOLD,      type: f32, value: "0.05",   source: "specs/25 § Autopilot (Generation default — below this angular delta the bot emits turn=0; ~3 deg; captured during reconcile)", cfg_test_only: false }
  - { name: BOT_KITE_RANGE,          type: f32, value: "2.0",    source: "specs/25 § Autopilot (Generation default — no knowledge backing; distance below which the bot back-pedals when targeting an enemy)", cfg_test_only: false }
  - { name: BOT_FIRE_MAX_RANGE,      type: f32, value: "10.0",   source: "specs/25 § Autopilot (Generation default — no knowledge backing; max distance at which the bot fires)", cfg_test_only: false }
  - { name: BOT_FIRE_LOS_RAY_STEP,   type: f32, value: "0.1",    source: "specs/25 § Autopilot (Generation default — no knowledge backing; step size for has_line_of_sight tile-grid ray-cast in tile units)", cfg_test_only: false }
  - { name: BOT_PATH_REPLAN_FRAMES,  type: u32, value: "30",     source: "specs/25 § Autopilot (Generation default — no knowledge backing; cap on BFS replan cadence)", cfg_test_only: false }
  - { name: BOT_HEALTH_PICKUP_THRESHOLD, type: f32, value: "0.5", source: "specs/25 § Autopilot (Generation default — no knowledge backing; HP fraction of PLAYER_MAX_HEALTH below which the bot routes via the nearest active health pickup before resuming the current objective)", cfg_test_only: false }
  - { name: BOT_PICKUP_DETOUR_BUDGET, type: u32, value: "4",      source: "specs/25 § Autopilot (Generation default — no knowledge backing; max extra BFS path tiles the bot will detour to grab an opportunistic ammo pickup)", cfg_test_only: false }
  - { name: BOT_WAYPOINT_REACHED_TILES, type: f32, value: "0.7",  source: "specs/25 § Autopilot (Generation default — no knowledge backing; distance under which the bot consumes the next BFS waypoint and steers toward the one after)", cfg_test_only: false }
  - { name: BOT_STUCK_MOVE_EPSILON, type: f32, value: "0.02",     source: "specs/25 § Autopilot (Generation default — no knowledge backing; per-frame movement threshold below which the bot's stuck-counter increments toward BOT_STUCK_FRAMES)", cfg_test_only: false }
  - { name: BOT_RNG_SEED,           type: u64, value: "0xC0FFEE", source: "specs/35 § Determinism (Generation default — Coder may pick any fixed constant; record in work/decisions.md)", cfg_test_only: false }
public_methods:
  # ---- Always compiled
  - signature: "pub fn parse_scenario(yaml: &str) -> Scenario"
    notes: |
      serde_yaml::from_str(yaml).expect('valid scenario YAML').
      Used by main.rs (--autopilot) and by run_all_scenarios test.
    cfg_test_only: false
  - signature: |
      impl BotState {
          pub fn new() -> Self;
      }
    notes: |
      Initial bot state: current objective index = 0, stuck counter = 0,
      strafe direction = +1, RNG seeded from BOT_RNG_SEED.
    cfg_test_only: false
  - signature: |
      pub fn bot_step(
          game: &GameState,
          scenario: &Scenario,
          bot: &mut BotState,
      ) -> (InputState, BotProgress)
    notes: |
      Per-frame primitive. Decides the bot's next InputState given the
      current GameState and the active objective from the Scenario.
      Returns (input, progress). Progress transitions:
        - Running while there is still an unmet objective and
          bot.frame_count < BOT_MAX_FRAMES and game.player.alive.
        - AllObjectivesComplete when the last objective's success
          condition is met.
        - Failed("timeout") when frame_count exceeds BOT_MAX_FRAMES.
        - Failed("player_died") when !game.player.alive (relevant for
          scenarios that don't expect death).

      Decision policy (specs/30 § Bot Behavior):
        1. Resolve target_pos from the active objective. For
           Objective::Kill("enemy") and Objective::Approach("enemy"),
           "enemy" resolves to the NEAREST alive enemy by
           player.pos.distance_to(enemy.pos) over
           game.enemies.iter().filter(|e| e.alive), with ties broken
           by index in level.enemy_spawns. Returns None when no
           enemies are alive — downstream callers handle this:
           Kill objective completion is keyed off
           `enemies.iter().all(|e| !e.alive)` regardless of
           resolve_target_pos, and Reach/Approach auto-complete via
           the None branch in check_objective_complete.
           Single-enemy fixtures behave identically to the legacy
           "first alive" rule because there is only one candidate.
           See spec/30 § Targets.
        2. Turn toward target_pos (apply BOT_TURN_THRESHOLD dead-zone).
        3. Movement mode:
           - kite (forward = -1.0) if the active objective targets an
             enemy (Kill or Approach with target "enemy") AND there
             exists at least one alive enemy `e` such that
             player.pos.distance_to(e.pos) < BOT_KITE_RANGE
             AND has_line_of_sight(player.pos, e.pos, &level) returns
             true. The trigger is "ANY alive enemy in range AND with
             LoS", not "the objective target is in range" — so a
             flanking enemy correctly forces back-pedal even when the
             objective target is far. The LoS gate prevents
             wall-separated kiting: a wall between the bot and the
             closest enemy keeps the bot in path-follow mode so BFS
             can route around the wall, rather than indefinitely
             backing away from a non-threatening proximity. The bot
             still keeps facing the objective target while kiting
             (LoS for firing on it is preserved). Single-enemy
             fixtures behave identically because "the only alive
             enemy" and "the objective target" coincide. Reconciled
             2026-05-08 after the Coder added the LoS check to fix
             indefinite westward back-pedal in local_chase_obstacle.
             See spec/30 § Per-frame Decision step 2.
           - else path-follow: take the next waypoint from the BFS
             plan, turn toward it, emit forward = +1.0 once roughly
             facing it. Path destination may be redirected via a
             pickup tile by step 3a (pickup-seeking modifiers).
        3a. Pickup-seeking modifiers (specs/30 § Pickup-Seeking) —
            evaluated only on path replan, only in path-follow mode,
            only when kite mode is NOT active. At most one modifier
            applies per replan; HP-threshold wins over ammo opportunism.
            - HP-threshold health routing: if
                player.health < BOT_HEALTH_PICKUP_THRESHOLD
                                * PLAYER_MAX_HEALTH
              AND any Pickup with kind == Health, active == true exists,
              the BFS path destination is redirected to the nearest
              such pickup. "Nearest" uses Euclidean
              `player.pos.distance_to(pickup.pos)`; ties broken by
              `Iterator::min_by`'s "first equal minimum" rule (i.e.
              by index in `level.pickups`). Once the bot's
              tile-position equals the pickup tile and game_loop has
              flipped active to false, the next replan re-evaluates
              and (now that no active health pickup at the same index
              satisfies the trigger) routes to the original objective
              target.
            - Ammo opportunism: when HP-threshold did NOT activate AND
                player.ammo == 0
              AND any Pickup with kind == Ammo, active == true exists,
              the modifier inspects the nearest active ammo pickup
              (`Iterator::min_by` over Euclidean
              `player.pos.distance_to(pickup.pos)`; ties broken by
              iteration order in `level.pickups`) and accepts it iff
                player.pos.distance_to(pickup.pos)
                  <= player.pos.distance_to(target_pos)
                     + BOT_PICKUP_DETOUR_BUDGET.
              When accepted, the BFS path destination is redirected to
              that pickup. The bot consumes the path-to-pickup segment;
              on arrival game_loop flips the pickup's active flag, and
              the next replan retargets the original objective. The
              ammo-trigger threshold is `ammo == 0` (deferred from the
              earlier `< PLAYER_AMMO_MAX` rule because at the prototype's
              level scale the latter fires unconditionally on round 1
              and the demo always detours; the stricter "out of ammo"
              keeps the modifier discriminating). The Euclidean budget
              check is an approximation of the BFS-path-length detour
              (`via_pickup_len - direct_len <= budget`) — the precise
              form is tracked as a deferred refinement; the two metrics
              agree on the test fixtures.
            Both modifiers are PATH MODIFIERS — they redirect the BFS
            path destination, but the active objective and its success
            condition are unchanged. Firing decisions in step 4 still
            gate off objective_target, not pickup_target.
        4. Fire iff the active objective is `kill:` AND there exists
           any alive enemy `e` such that ALL THREE gates hold for
           that enemy:
             player.pos.distance_to(e.pos) < BOT_FIRE_MAX_RANGE
             AND has_line_of_sight(player.pos, e.pos, &level)
             AND |angle_to(e.pos) - player.facing| < BOT_FACING_THRESHOLD.
           The fire gate is keyed on "any alive enemy in
           range/LoS/facing", not on the objective target alone, so
           the bot can defend itself against a flanking enemy while
           routing toward the objective. Single-enemy fixtures behave
           identically because "the only alive enemy" and "the
           objective target" coincide. While routing toward a pickup
           the bot may still fire at an enemy along the way if all
           three gates hold for that enemy. See spec/30 § Per-frame
           Decision step 3.
        5. Stuck-detect fallback (BOT_STUCK_FRAMES /
           BOT_REVERSE_STRAFE_FRAMES) is unchanged in mechanics;
           strafe activates when BFS-driven motion is itself blocked.

      Helpers (Coder-internal, not part of the public API; spec/80
      § "no dead pub exports"):
        - has_line_of_sight(from: Vec2, to: Vec2, game: &GameState) -> bool
            Tile-grid ray-cast at step BOT_FIRE_LOS_RAY_STEP. Returns
            false on first sample inside Tile::Wall (resolved via
            level_data::is_wall on game.level), else true. Closed-form
            2D DDA is allowed in lieu of stepping. The `&GameState`
            arg form (rather than `&Level`) keeps the helper consistent
            with bot_step's borrow graph and is reflected in the
            current implementation.
        - find_path(from: (usize, usize), to: (usize, usize), game: &GameState) -> Vec<(usize, usize)>
            BFS over game.level.tiles; 4-connected; nodes are
            Tile::Floor. Tile-coordinate args (rather than Vec2) avoid
            redundant pos_to_tile calls inside the BFS hot loop.
            Replan cadence per BOT_PATH_REPLAN_FRAMES OR target moved
            > 1 tile since last plan. Empty Vec on no-path; bot
            falls back to bee-lining the straight-line target.
        - pickup-seeking selection helpers — Coder-internal. The
          shape of these helpers (a single fn that returns
          Option<(usize_pickup_index, Vec2_pickup_pos)>, vs. two
          separate fns for health vs ammo, vs. inlined logic in
          bot_step) is unspecified; pinning the public surface to
          the modifier behavior in specs/30 § Pickup-Seeking
          suffices. Whichever helper shape the Coder picks must be
          private (module-internal) to avoid spec/80 § "no dead pub
          exports".

      Bot determinism: two runs against the same Scenario + same
      GameState seed must produce identical (input, progress)
      sequences. BFS pathfinding is deterministic (no randomness in
      node visit order); Coder must pick a stable tie-breaking rule
      (e.g. fixed neighbor order N/E/S/W) so two runs on the same
      Level produce the same path. Stuck-detection strafe-direction
      pick is also deterministic — either an RNG-seeded sample from
      BOT_RNG_SEED or a deterministic toggle (`strafe_dir = -strafe_dir`
      on each `BOT_STUCK_FRAMES + BOT_REVERSE_STRAFE_FRAMES` boundary)
      both satisfy the determinism contract. The current
      implementation uses the RNG-seeded form (`bot.rng.next_f32() > 0.5`
      after a stuck-recovery strafe completes); BOT_RNG_SEED and
      `BotState::rng` are therefore live, not reserved. A future Coder
      may swap to the toggle without behavior change beyond the strafe
      direction's polarity, per `coder_degrees_of_freedom` and
      specs/25 § RNG Seeds. This is the determinism guarantee
      specs/35 § Determinism relies on.
    cfg_test_only: false

  # ---- #[cfg(test)] only
  - signature: "pub fn run_scenario(scenario: &Scenario) -> ScenarioResult"
    notes: |
      Test-only batch driver. Pseudocode:
        1. state = GameState::new();
        2. bot = BotState::new();
        3. loop:
             (input, progress) = bot_step(&state, scenario, &mut bot);
             game_loop::update(&mut state, &input, BOT_FRAME_TIME);
             if !matches!(progress, BotProgress::Running): break;
        4. for assertion in &scenario.assertions:
             check_assertion(&state, assertion);
        5. return ScenarioResult { passed, failures }.
      Implemented in terms of bot_step so the test path and the
      --autopilot path share the same bot logic.

      Field-value resolver (`get_field_value` helper, module-private,
      #[cfg(test)] only). MUST support the field set pinned in
      specs/30 § Available Fields. The resolver matches `assertion.field`
      against the literal string and returns Option<AssertValue>; an
      unrecognized field becomes `"unknown field: <name>"` in
      ScenarioResult.failures (see the run_scenario loop body above).
      Pinned field set as of the 2026-05-14 armor slice (the six fields
      listed in specs/30 § Implementation Status as "implemented"):
        "player.alive"   -> AssertValue::Bool(state.player.alive)
        "player.health"  -> AssertValue::Number(state.player.health as f32)
        "player.ammo"    -> AssertValue::Number(state.player.ammo as f32)
        "player.armor"   -> AssertValue::Number(state.player.armor as f32)  [armor slice]
        "enemy.alive"    -> AssertValue::Bool(state.enemies.iter().any(|e| e.alive))
        "game.won"       -> AssertValue::Bool(state.won)
      Any field listed in specs/30 § Available Fields as "implemented"
      MUST appear in the match. Fields listed under specs/30 § "Not yet
      implemented" (`player.position.x`, `player.position.y`,
      `enemy.health`, `game.running`, `game.frames`) MUST NOT appear —
      the resolver falls through to the `_ => None` arm so the
      run_scenario loop surfaces `"unknown field: <name>"` failures
      that mark the field as not-yet-available. Captured during the
      2026-05-14 armor release reconcile after the prior contract
      listed a stray `"game.frames" -> ... [counter-test field]` example
      that contradicted specs/30 — removed to keep the contract aligned
      with the spec's implemented/deferred split.
    cfg_test_only: true
  - signature: |
      #[test]
      fn run_all_scenarios()
    notes: |
      Iterates `tests/**/*.yaml`, parses each scenario, runs it,
      asserts ScenarioResult.passed == true, panics with the first
      failure message otherwise. This is the entry point cargo test
      discovers.
    cfg_test_only: true
cross_module_borrows:
  - "&GameState (read-only in bot_step; &mut in run_scenario)"
  - "Constructs InputState by value each frame"
notes: |
  Module-level `#[cfg(test)]` gate is REMOVED (was previously
  `#[cfg(test)] mod autopilot;` in main.rs). The autopilot module
  is now always compiled; individual symbols inside use per-symbol
  `#[cfg(test)]` gates per the cfg_test_only field on each entry
  above. `mod autopilot;` in main.rs has no cfg attribute.

  Consumers:
    - main.rs: parse_scenario, BotState, BotProgress, bot_step
    - run_all_scenarios test: parse_scenario, run_scenario,
      ScenarioResult, all assertion types

  Dependency on serde/serde_yaml moves from [dev-dependencies] to
  [dependencies] (specs/80 § Dependencies). game_ir.yaml /
  Cargo.toml carry the manifest change.
