# raycaster module contract.
# Slice 4 of 6 of the FPS migration (specs/45). Walls + flat
# floor / ceiling from slice 1, plus a per-column wall-depth z-buffer
# and a back-to-front sprite pass for live enemies, dying enemies,
# corpses, blood splats, and active pickups from slice 2, plus the
# slice-3 first-person effects pass (screen-space muzzle-flash
# overlay, world-space tracer line, wall-puff billboard with a
# full-bright first phase, extra-light bias on wall and sprite
# shading during the firing window, player damage / pickup tint
# screen-space overlays). Slice 4 does NOT add a new pass to this
# module -- the FPS HUD layer (bottom chrome strip; no on-view crosshair per knowledge/raycaster_hud.md § On-View Crosshair — Absent in the Reference's First-Person View) lives
# in renderer::draw_hud_fps, called from main.rs after raycaster::draw
# returns, so this module's signature and pass count are unchanged
# from slice 3. Slice 5 flips the --render-mode default from `topdown`
# to `raycaster`, so this module now runs by default; `topdown`
# remains a one-cycle opt-in until slice 6 removes the topdown code
# path.
name: raycaster
file: src/raycaster.rs
depends_on: [level_data, player_state, enemy_logic, visual_effects]
public_types: []
public_constants:
  # All numeric values pinned in specs/25 § Renderer (Raycaster).
  # Listed here because the raycaster is the single consumer (per the
  # _shared.yaml § intentionally_unspecified rule "renderer color
  # values live in the consumer's contract").
  - { name: RAYCASTER_FOV_RADIANS,
      type: f32,
      value: "std::f32::consts::FRAC_PI_2",
      source: "specs/25 § Renderer (Raycaster) / Projection (knowledge-backed: § Column Projection Model)" }
  - { name: HORIZON_Y,
      type: usize,
      value: "(WINDOW_HEIGHT - crate::renderer::RAYCASTER_HUD_STRIP_HEIGHT_PX as usize) / 2",
      source: "specs/25 § Renderer (Raycaster) / Projection (knowledge-backed: knowledge/raycaster_renderer.md § Floor and Ceiling Treatment — 'Status-bar carve-out … centerY is half the viewport height'). The formula collapses to `WINDOW_HEIGHT / 2` when RAYCASTER_HUD_STRIP_HEIGHT_PX is 0, so pre-slice-4 callers are unaffected." }
  - { name: WALL_HEIGHT_TILES,
      type: f32,
      value: "1.0",
      source: "specs/25 § Renderer (Raycaster) / Projection (Generation default)" }
  - { name: EYE_HEIGHT_FRACTION,
      type: f32,
      value: "41.0 / 128.0",
      source: "specs/25 § Renderer (Raycaster) / Projection (numerator knowledge-backed: knowledge/player_movement.md 'View height | 41 units'; denominator Generation default — canonical room-height citation pending an Extractor pass)" }
  - { name: RAYCASTER_MAX_DEPTH,
      type: f32,
      value: "32.0",
      source: "specs/25 § Renderer (Raycaster) / Far Clipping (knowledge-backed: § Max Render Distance)" }
  - { name: RAYCASTER_NSEW_DARKEN_FACTOR,
      type: f32,
      value: "0.75",
      source: "specs/25 § Renderer (Raycaster) / Wall Shading (knowledge-backed mechanism: § NS-vs-EW Wall Shading; factor is generation default in that spirit)" }
  - { name: RAYCASTER_WALL_COLOR_NEAR,
      type: u32,
      value: "0xC0C0C0",
      source: "specs/25 § Renderer (Raycaster) / Wall Shading (Generation default)" }
  - { name: RAYCASTER_WALL_COLOR_FAR,
      type: u32,
      value: "0x101010",
      source: "specs/25 § Renderer (Raycaster) / Wall Shading (Generation default)" }
  - { name: RAYCASTER_FLOOR_COLOR,
      type: u32,
      value: "0x404040",
      source: "specs/25 § Renderer (Raycaster) / Floor / Ceiling (Generation default)" }
  - { name: RAYCASTER_CEILING_COLOR,
      type: u32,
      value: "0x202020",
      source: "specs/25 § Renderer (Raycaster) / Floor / Ceiling (Generation default)" }
  - { name: RAYCASTER_SPRITE_NEAR_PLANE,
      type: f32,
      value: "0.1",
      source: "specs/25 § Renderer (Raycaster) / Sprites and Billboards (knowledge-backed mechanism: knowledge/raycaster_sprites.md § World → Camera-Space Transform — MINZ; value is generation default in that spirit, scaled to tile units)" }
  - { name: RAYCASTER_SPRITE_SIDE_CONE_FACTOR,
      type: f32,
      value: "4.0",
      source: "specs/25 § Renderer (Raycaster) / Sprites and Billboards (knowledge-backed: knowledge/raycaster_sprites.md § World → Camera-Space Transform — Side-cone reject)" }
  - { name: RAYCASTER_SPRITE_DEPTH_FADE_FACTOR,
      type: f32,
      value: "0.7",
      source: "specs/25 § Renderer (Raycaster) / Sprites and Billboards (knowledge-permitted, knowledge/raycaster_sprites.md § Flat-Color vs Textured Choice — 'Distance attenuation is optional — if applied, it follows the same lerp-toward-far convention as the wall pass'; factor is generation default)" }
  - { name: RAYCASTER_SPRITE_MIN_PROJ_DIST,
      type: f32,
      value: "1.0",
      source: "specs/25 § Renderer (Raycaster) / Sprites and Billboards (Generation default — caps the projected screen extent of a near-camera billboard so flat-color rectangles do not monopolize the framebuffer; knowledge has no analogue)" }
  # Slice 3 first-person effects (specs/25 § Renderer (Raycaster) /
  # First-Person Effects).
  - { name: RAYCASTER_EXTRA_LIGHT_SHADE_DELTA,
      type: f32,
      value: "0.0625",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (knowledge-backed: knowledge/raycaster_effects.md § Extra-Light Bias — '1 ramp-step ≈ 6.25%' on the reference's 16-step ramp)" }
  - { name: RAYCASTER_MUZZLE_FLASH_CENTER_X,
      type: usize,
      value: "WINDOW_WIDTH / 2",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (Generation default — knowledge-backed mechanism: knowledge/raycaster_effects.md § Held-Weapon View Sprite, screen-anchored not world-anchored; pixel coordinate is generation default in that spirit)" }
  - { name: RAYCASTER_MUZZLE_FLASH_CENTER_Y,
      type: usize,
      value: "WINDOW_HEIGHT * 3 / 4",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (Generation default — same rationale as RAYCASTER_MUZZLE_FLASH_CENTER_X; placed where a held pistol's muzzle would exit the bottom of the frame)" }
  - { name: RAYCASTER_MUZZLE_FLASH_RADIUS_PX,
      type: i32,
      value: "24",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (Generation default — sized larger than topdown MUZZLE_FLASH_RADIUS = 6 because the raycaster overlay is screen-space at the gun anchor, not world-space at the player position)" }
  - { name: RAYCASTER_TRACER_THICKNESS_PX,
      type: i32,
      value: "1",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (Generation default — knowledge has no tracer in the reference; we keep one for visual parity with the topdown TRACER_THICKNESS = 1, deliberate generation-default deviation per specs/45 § Generation Default Deviation: Tracer Line)" }
  - { name: RAYCASTER_PUFF_FULL_BRIGHT_FRACTION,
      type: f32,
      value: "0.5",
      source: "specs/25 § Renderer (Raycaster) / First-Person Effects (knowledge-backed: knowledge/raycaster_effects.md § Wall-Hit Impact Puff — first frame full-bright, subsequent frames distance-attenuated; the 4-frame reference puff collapses to a 'first half / second half' split in our 1-Effect model. Threshold midpoint at 0.5 is generation default in that spirit)" }
public_methods:
  - signature: |
      pub fn draw(
          framebuffer: &mut Vec<u32>,
          level: &Level,
          player: &Player,
          enemies: &[Enemy],
          fx: &VisualEffects,
      )
    notes: |
      Single-entry-point world-layer draw for --render-mode=raycaster
      (specs/45 § Per-Frame Draw Dispatch). Writes EVERY pixel of the
      framebuffer (no read-modify-write of unaffected regions) so the
      caller does not need to clear it first. Layering above the
      raycaster's output (HUD, game-over border) is the caller's
      responsibility -- main.rs invokes renderer::draw_hud and
      renderer::draw_game_over_border after raycaster::draw returns.
      See ir/contracts/_shared.yaml § main_cli § render_mode for the
      dispatch shape.

      Three-pass structure (specs/45 § Per-Frame Draw Dispatch;
      knowledge/raycaster_effects.md § Effect Pass Ordering):
        Pass 1: wall pass (slice 1, slice-3 extra-light bias on shading)
                -- fills ceiling + walls + floor AND populates the
                per-column wall-depth z-buffer.
        Pass 2: sprite pass (slice 2 + slice-3 wall-puff source +
                slice-3 extra-light bias) -- back-to-front over the
                entity lists; per-column z-test against wall_depth[].
        Pass 3: effects pass (slice 3) -- world-space tracer line
                (per-column z-test), screen-space muzzle-flash overlay
                (no z-test), full-viewport damage tint overlay
                (alpha blend), full-viewport pickup tint overlay
                (alpha blend). Layers 3-4 inside this pass are
                world-occluded then screen-overlay then full-viewport
                blends; ordering is fixed (specs/45 § First-Person
                Effects § Effect Pass Order rules 3..6).

      Once-per-frame derived state (computed at the top of draw,
      before Pass 1, cached for the frame -- specs/45 § Extra-Light
      Bias rule 1):
        firing_active: bool =
            fx.effects.iter()
              .any(|e| e.kind == EffectKind::MuzzleFlash
                       && e.lifetime_remaining > 0.0);
      Used by both Pass 1 (wall shading) and Pass 2 (sprite shading
      for non-full-bright candidates). NOT used by Pass 3 (the muzzle
      flash overlay tests the same condition independently for its
      "should I draw?" gate). One read of fx.effects is enough; the
      Coder MAY collapse the three iterations into one if a single
      pass over fx.effects produces all three derived sets (sprite-
      pass effect candidates, tracer list, firing_active flag) --
      whichever shape, the contract is the once-per-frame compute,
      not the iteration count.

      ----------------------------------------------------------------
      Pass 1 (wall pass) -- per-column algorithm (one ray per pixel
      column, x in 0..WINDOW_WIDTH):
        1. theta = player.facing + column_angle_offset[x]
           where column_angle_offset[x] = atan2((x - WINDOW_WIDTH / 2) as f32,
                                                focal_px) -- centered on the
           middle column, derived from focal_px once at startup.
        2. focal_px = (WINDOW_WIDTH as f32 / 2.0) /
                       (RAYCASTER_FOV_RADIANS / 2.0).tan()
           At RAYCASTER_FOV_RADIANS = pi/2 this is exactly
           WINDOW_WIDTH / 2 (knowledge § Column Projection Model).
        3. Grid-DDA walk from player.pos along ray_dir through the
           level_data::Level grid (knowledge § Wall Traversal Strategy
           "Alternative — grid-DDA"). The ray_dir parameterization is a
           Coder degree of freedom -- the unit-direction form
           (cos(theta), sin(theta)) is the obvious choice. Track per-
           axis cumulative t values during the walk. Stop when
           level_data::is_wall(level, tile_x, tile_y) is true OR t
           exceeds RAYCASTER_MAX_DEPTH.
        4. perp_dist = camera-forward projection of the ray's travel
           to the hit point. Required identity (specs/45 § Perpendicular
           Distance and Fisheye Correction):
               perp_dist == dot(hit_pos - player.pos, camera_forward)
           where camera_forward = (cos(player.facing), sin(player.facing)).
           Equivalently, with the unit-direction ray of step 3 and t =
           the matched DDA distance to the hit:
               perp_dist == t * cos(column_angle_offset[x])
           The cos(column_angle_offset[x]) multiplication MUST appear
           explicitly in the implementation. Naive Euclidean t (no
           cos correction) is FORBIDDEN -- it produces the fisheye
           bow described in knowledge § Perpendicular Distance "Feel".
           The boolean "did the ray cross a horizontal tile boundary
           last" picks between "EW wall" (apply
           RAYCASTER_NSEW_DARKEN_FACTOR) and "NS wall" (nominal).
        5. column_h_unclamped = ((WALL_HEIGHT_TILES * focal_px) / perp_dist)
                                  .max(1.0)
           # Asymmetric split (specs/45 § Column Projection): eye sits at
           # EYE_HEIGHT_FRACTION × WALL_HEIGHT_TILES above the floor, so
           # more wall extends above the eye than below. Split runs on the
           # UNCLAMPED column; each resulting screen-Y is clamped
           # independently in step 7. Clamping before the split would
           # leave a floor sliver beneath walls the player is pressed
           # against.
        6. shade_t = (perp_dist / RAYCASTER_MAX_DEPTH).clamp(0.0, 1.0)
           # Slice-3 extra-light bias (specs/45 § Extra-Light Bias).
           # When firing_active is true, shift shade_t toward "near"
           # by RAYCASTER_EXTRA_LIGHT_SHADE_DELTA before the lerp.
           if firing_active:
               shade_t = (shade_t - RAYCASTER_EXTRA_LIGHT_SHADE_DELTA)
                          .clamp(0.0, 1.0)
           wall_color = lerp_rgb(RAYCASTER_WALL_COLOR_NEAR,
                                  RAYCASTER_WALL_COLOR_FAR, shade_t)
           if ew_wall: wall_color = scale_rgb(wall_color,
                                              RAYCASTER_NSEW_DARKEN_FACTOR)
           lerp_rgb / scale_rgb are module-private helpers (Coder
           degree of freedom on shape; per-channel multiply is the
           obvious form). The extra-light bias modifies shade_t
           before the lerp; it does NOT compose with NS/EW darken
           in any other way.
        7. Write column x into framebuffer:
             - rows [0, ceiling_top) ← RAYCASTER_CEILING_COLOR
             - rows [ceiling_top, floor_top) ← wall_color
             - rows [floor_top, WINDOW_HEIGHT) ← RAYCASTER_FLOOR_COLOR
           where ceiling_top = (HORIZON_Y as f32
                                 - (1.0 - EYE_HEIGHT_FRACTION)
                                 * column_h_unclamped)
                                 .clamp(0.0, WINDOW_HEIGHT as f32) as usize
                 floor_top   = (HORIZON_Y as f32
                                 + EYE_HEIGHT_FRACTION
                                 * column_h_unclamped)
                                 .clamp(0.0, WINDOW_HEIGHT as f32) as usize
        8. Write wall_depth[x] = perp_dist (knowledge:
           knowledge/raycaster_sprites.md § Per-Column Wall Depth
           (Z-Buffer Equivalent)).
        9. If the DDA walk exits via RAYCASTER_MAX_DEPTH without a
           hit, skip step 5/6/7's wall-slice write -- only fill the
           full column with floor + ceiling -- and write
           wall_depth[x] = RAYCASTER_MAX_DEPTH as the far-clip
           sentinel (sprites at that distance or beyond will not
           draw; sprites closer will). Specs/45 § Far Clipping +
           § Sprites and Billboards § Per-Column Wall Depth Z-Buffer.

      ----------------------------------------------------------------
      Pass 2 (sprite pass) -- back-to-front billboard composite:
        a. Build the candidate sprite list. Each candidate carries
           (pos: Vec2, world_half_width: f32, world_half_height: f32,
            color: u32, full_bright: bool). Sources (specs/45
            § Sprites and Billboards § Sprite Sources, § First-Person
            Effects § Wall Puff Billboard):
             - Live enemies: iterate `enemies`; include where
               `enemy.alive`. world_half_* = ENEMY_RADIUS_TILES.
               color = COLOR_PAIN_FLASH if pain_flash_remaining > 0,
               else COLOR_ENEMY. full_bright = false.
             - Dying-enemy death fade: iterate `fx.effects`; include
               where `kind == EffectKind::EnemyDeathFade`.
               Compute fade_t = 1.0 - lifetime_remaining /
                                ENEMY_DEATH_FADE_DURATION
               (single value drives both color and size).
               world_half_* = lerp(ENEMY_RADIUS_TILES,
                                    ENEMY_CORPSE_RADIUS / TILE_SIZE,
                                    fade_t).
                 — applied to both world_half_width and
                 world_half_height (sprites are square).
               color = lerp_rgb(COLOR_ENEMY, COLOR_CORPSE, fade_t).
               full_bright = false.
               At fade_t == 1.0 both extent and color match the
               corpse that spawns next, so the visual transitions
               continuously from live → fading → corpse without a
               size pop. specs/45 § Sprites and Billboards § Sprite
               Sources item 2.
             - Enemy corpse: iterate `fx.effects`; include where
               `kind == EffectKind::EnemyCorpse`.
               world_half_* = ENEMY_CORPSE_RADIUS / TILE_SIZE.
               color = COLOR_CORPSE. full_bright = false.
             - Blood splat: iterate `fx.effects`; include where
               `kind == EffectKind::BloodSplat`.
               world_half_* = BLOOD_RADIUS / TILE_SIZE.
               color = COLOR_BLOOD. full_bright = false.
             - Wall puff (slice 3): iterate `fx.effects`; include
               where `kind == EffectKind::WallPuff`.
               world_half_* = PUFF_RADIUS / TILE_SIZE
                              (= 4.0 / 32.0 = 0.125 tile).
               color = COLOR_PUFF.
               full_bright = lifetime_remaining / PUFF_DURATION
                             > RAYCASTER_PUFF_FULL_BRIGHT_FRACTION.
               specs/45 § First-Person Effects § Wall Puff
               Billboard. The full_bright flag is what selects
               between the bright-first-phase override and the
               regular distance-attenuated path in step (d) below.
             - Active pickups: iterate `level.pickups`; include where
               `pickup.active`. Per kind:
                 Health: world_half_* = PICKUP_HEALTH_SIZE_PX as f32 / 2.0
                                         / TILE_SIZE;
                         color = PICKUP_HEALTH_OUTER_COLOR.
                 Ammo:   world_half_* = PICKUP_AMMO_SIZE_PX as f32 / 2.0
                                         / TILE_SIZE;
                         color = PICKUP_AMMO_COLOR.
                 full_bright = false (pickups distance-attenuate
                 like enemies/corpses/blood).
             Skip: MuzzleFlash and Tracer effect kinds. MuzzleFlash
             drives the screen-space overlay in Pass 3 (existence
             test only). Tracer drives the world-space line
             projection in Pass 3 (consumes pos+end_pos, projected
             differently from sprite billboards).
        b. For each candidate, compute camera-space transform
           (knowledge § World → Camera-Space Transform; sign of
           right_offset adapted for our +y-down world — see note
           below):
             tr = sprite.pos - player.pos
             forward_dist = tr.x * cos(player.facing)
                            + tr.y * sin(player.facing)
             right_offset = tr.y * cos(player.facing)
                            - tr.x * sin(player.facing)
           Y-axis convention note. Knowledge § World → Camera-Space
           Transform pins r = (sin yaw, -cos yaw) and right_offset =
           tr.x*sin(yaw) - tr.y*cos(yaw); that derivation assumes the
           reference engine's +y-up world. Worldsmith's level data is
           +y-down (the topdown renderer maps world (x,y) directly to
           screen (x,y) — `renderer.rs` `(tx * TILE_SIZE, ty *
           TILE_SIZE)`). Translating the reference formula to a
           +y-down world flips the sign of the y-component, giving
           r = (-sin yaw, cos yaw) and the right_offset formula above.
           Verification anchor: with player.facing=0 (looking east =
           +x = right on screen), an entity at (player.x, player.y-1)
           is geometrically on the player's LEFT (north = up on
           screen for an east-facing camera in a +y-down world).
           Substituting tr=(0,-1) yields right_offset = -1*1 - 0*0 =
           -1 (negative = left half of screen) — the screen-x-center
           must land at WIDTH/2 - xscale. With the original
           reference-engine sign the same setup yielded +1 → sprites
           rendered mirrored left↔right, matching knowledge § World →
           Camera-Space Transform "Feel" — "Bugs in sign convention
           manifest as sprites snapping to the wrong side of the
           screen when the player turns; mismatched cosine/sine
           handedness puts entities on the opposite side of every
           wall." The signed convention "positive right_offset maps
           to the right half of the screen" still holds; only the
           formula deriving the signed value changes.
           Reject if forward_dist < RAYCASTER_SPRITE_NEAR_PLANE.
           Coder MAY also reject if
             |right_offset| > RAYCASTER_SPRITE_SIDE_CONE_FACTOR
                               * forward_dist
           as an early-out (correctness-equivalent to always-clip --
           specs/45 § Camera-Space Transform side-cone-reject is
           "optional fast path").
        c. Sort the surviving candidates by forward_dist DESCENDING
           (= xscale ascending; farthest first). Specs/45 § Sort Order;
           knowledge § Sort Order: Back-to-Front. Sort algorithm is a
           Coder degree of freedom (Vec::sort_by, selection sort, etc.) --
           the comparator on forward_dist is total. Secondary tie-
           breaker (e.g. source-list index) MUST be deterministic
           (specs/45 § Determinism).
        d. For each sorted candidate, compute the depth-attenuated
           color, project to screen coordinates, and paint per-column
           with z-test. Depth attenuation matches the wall pass so a
           sprite partially occluded by a near-shaded wall does not
           visually clash with the wall's deep-shade band (specs/45
           § Distance Attenuation (Sprites); knowledge § Flat-Color
           vs Textured Choice — "if applied, follows the same lerp-
           toward-far convention as the wall pass"). Slice-3
           full-bright candidates and slice-3 extra-light bias
           branch the attenuation:
             if candidate.full_bright {
                 # Slice-3 full-bright path (wall puff first phase,
                 # specs/45 § Wall Puff Billboard). No distance
                 # attenuation, no extra-light bias modulation.
                 shaded_color = candidate.color;
             } else {
                 sprite_shade_t = (forward_dist / RAYCASTER_MAX_DEPTH)
                                     .clamp(0.0, 1.0)
                                  * RAYCASTER_SPRITE_DEPTH_FADE_FACTOR;
                 # Slice-3 extra-light bias on non-full-bright sprites
                 # (specs/45 § Extra-Light Bias).
                 if firing_active {
                     sprite_shade_t = (sprite_shade_t
                                        - RAYCASTER_EXTRA_LIGHT_SHADE_DELTA)
                                       .clamp(0.0, 1.0);
                 }
                 shaded_color = lerp_rgb(candidate.color,
                                          RAYCASTER_WALL_COLOR_FAR,
                                          sprite_shade_t);
             }
             # xscale clamps the projection divisor so a sprite
             # closer than RAYCASTER_SPRITE_MIN_PROJ_DIST renders
             # at the size it would have at MIN_PROJ_DIST instead
             # of monopolizing the framebuffer. The unclamped
             # forward_dist is still used for the per-column z-test
             # below — the clamp only affects projection extent.
             # specs/25 § Renderer (Raycaster) / Sprites and
             # Billboards § RAYCASTER_SPRITE_MIN_PROJ_DIST.
             xscale = focal_px / forward_dist.max(
                          RAYCASTER_SPRITE_MIN_PROJ_DIST)
             screen_x_center = WINDOW_WIDTH as f32 / 2.0
                                + right_offset * xscale
             half_w_px = sprite.world_half_width * xscale
             half_h_px = sprite.world_half_height * xscale
             x1 = (screen_x_center - half_w_px).round()
                    .clamp(0, WINDOW_WIDTH as i32 - 1) as usize
             x2 = (screen_x_center + half_w_px).round()
                    .clamp(0, WINDOW_WIDTH as i32 - 1) as usize
             if x2 < x1 { continue; }   // fully off-screen
             # Floor-anchored sprite (specs/45 § Sprite Vertical Anchor):
             # sprite bottom == floor at this distance, mirroring the
             # reference engine's "entity world Y == floor Y" convention.
             # Older slices centered sprites on HORIZON_Y, which floated
             # everything at eye height regardless of sprite size.
             screen_y_center = HORIZON_Y as f32
                                + (EYE_HEIGHT_FRACTION
                                   - sprite.world_half_height) * xscale
             y1 = (screen_y_center - half_h_px).round()
                    .clamp(0, WINDOW_HEIGHT as i32) as usize
             y2 = (screen_y_center + half_h_px).round()
                    .clamp(0, WINDOW_HEIGHT as i32) as usize
             for x in x1..=x2:
               if forward_dist < wall_depth[x]:
                 for y in y1..y2:
                   framebuffer[y * WINDOW_WIDTH + x] = shaded_color;
           Comparison is strict-less-than -- at exact equality the
           wall wins (knowledge § Per-Column Wall Depth — Comparison).
           The attenuation reuses the same module-private lerp_rgb
           helper used in Pass 1; no new helper is added.

      ----------------------------------------------------------------
      Pass 3 (effects pass, slice 3) -- runs after Pass 2 returns;
      reads firing_active and `fx.effects[*]` filtered to MuzzleFlash
      and Tracer (Pass 2 already consumed the other kinds), plus
      `player.damage_count` and `fx.pickup_tint_count` for the two
      overlays. Layering inside this pass is fixed (specs/45 §
      First-Person Effects § Effect Pass Order):
        layer 3: tracer line (world-occluded);
        layer 4: muzzle flash overlay (screen-space, no z-test);
        layer 5: damage tint overlay (full-viewport blend);
        layer 6: pickup tint overlay (full-viewport blend).

      Layer 3 -- bullet tracer (specs/45 § Bullet Tracer):
        for each Effect with kind == EffectKind::Tracer
                       and lifetime_remaining > 0.0:
          # Project end_pos via the Pass 2 camera-space transform.
          tr_end = effect.end_pos - player.pos;
          forward_dist_end = tr_end.x * cos(player.facing)
                              + tr_end.y * sin(player.facing);
          right_offset_end = tr_end.y * cos(player.facing)
                              - tr_end.x * sin(player.facing);
          if forward_dist_end < RAYCASTER_SPRITE_NEAR_PLANE { continue; }
          screen_x_end = (WINDOW_WIDTH as f32 / 2.0)
                          + right_offset_end * (focal_px / forward_dist_end);
          x_end_int = screen_x_end.round()
                       .clamp(0, WINDOW_WIDTH as i32 - 1) as i32;
          # Start anchor is the screen-space gun anchor; per-column
          # depth interpolates from MUZZLE_OFFSET to forward_dist_end.
          x_start_int = RAYCASTER_MUZZLE_FLASH_CENTER_X as i32;
          y_start_int = RAYCASTER_MUZZLE_FLASH_CENTER_Y as i32;
          y_end_int = HORIZON_Y as i32;
          # Walk the line (Bresenham or DDA -- Coder degree of
          # freedom). For each (x, y) on the line:
          #   if x in [0, WINDOW_WIDTH) and y in [0, WINDOW_HEIGHT):
          #     if x_start_int == x_end_int:
          #       depth = forward_dist_end;
          #     else:
          #       depth = lerp(MUZZLE_OFFSET as f32,
          #                    forward_dist_end,
          #                    (x - x_start_int) as f32
          #                    / (x_end_int - x_start_int) as f32);
          #     if depth < wall_depth[x as usize]:
          #       framebuffer[y as usize * WINDOW_WIDTH + x as usize]
          #         = COLOR_TRACER;
          # Strict-less-than at depth==wall_depth, matching Pass 2's
          # convention. RAYCASTER_TRACER_THICKNESS_PX = 1 in slice 3
          # so the inner loop draws a single-pixel line; wider would
          # require an N-pixel thickening pass per column.
          # No distance attenuation, no extra-light bias modulation.

      Layer 4 -- muzzle flash overlay (specs/45 § Muzzle Flash
      Screen-Space Overlay):
        if firing_active {
            # filled disc (Coder degree of freedom on shape -- disc
            # vs rectangle vs textured sprite; disc is the obvious
            # choice).
            cx = RAYCASTER_MUZZLE_FLASH_CENTER_X as i32;
            cy = RAYCASTER_MUZZLE_FLASH_CENTER_Y as i32;
            r  = RAYCASTER_MUZZLE_FLASH_RADIUS_PX;
            for y in (cy - r) .. (cy + r):
              for x in (cx - r) .. (cx + r):
                if x in [0, WINDOW_WIDTH) and y in [0, WINDOW_HEIGHT)
                   and (x - cx).pow(2) + (y - cy).pow(2)
                       <= r.pow(2):
                  framebuffer[y as usize * WINDOW_WIDTH + x as usize]
                    = COLOR_MUZZLE_FLASH;
        }
        # Full-bright -- no distance attenuation, no extra-light
        # bias modulation, no z-test. Single overlay regardless of
        # how many MuzzleFlash effects are active (knowledge §
        # Brief Brightness Pulse on Walls -- "Stacking is not
        # additive").

      Layer 5 -- damage tint overlay (specs/45 § Player Damage Tint
      Overlay; same formula as renderer::draw layer 8):
        if player.damage_count > 0.0 {
            level = ((player.damage_count
                       * DAMAGE_TINT_LEVELS as f32)
                      / DAMAGE_TINT_CAP).ceil() as u32;
            level = level.min(DAMAGE_TINT_LEVELS);
            if level > 0 {
                alpha_pct = (DAMAGE_TINT_MAX_ALPHA_PCT * level)
                             / DAMAGE_TINT_LEVELS;
                # Per-pixel software blend across the full
                # framebuffer (same blend formula renderer.rs uses).
                for px in framebuffer.iter_mut() {
                    *px = blend_rgb(*px, COLOR_DAMAGE_TINT, alpha_pct);
                }
            }
        }

      Layer 6 -- pickup tint overlay (specs/45 § Pickup Tint
      Overlay; same formula as renderer::draw layer 8.5):
        if fx.pickup_tint_count > 0.0 {
            pickup_level = ((fx.pickup_tint_count
                              * PICKUP_TINT_LEVEL_COUNT as f32)
                             / PICKUP_TINT_CAP).ceil() as u32;
            pickup_level = pickup_level.min(PICKUP_TINT_LEVEL_COUNT);
            if pickup_level > 0 {
                alpha_pct = (PICKUP_TINT_MAX_ALPHA_PCT * pickup_level)
                             / PICKUP_TINT_LEVEL_COUNT;
                for px in framebuffer.iter_mut() {
                    *px = blend_rgb(*px, COLOR_PICKUP_TINT, alpha_pct);
                }
            }
        }
        # Independent of and additive with the damage tint overlay --
        # both may render simultaneously when the player is hurt and
        # grabs a pickup in the same frame. Same blend_rgb helper as
        # layer 5; the overlays compose left-to-right (damage first,
        # then pickup on top).

      blend_rgb is a module-private helper (Coder degree of freedom
      on shape; the per-channel `out = (alpha_pct * tint + (100 -
      alpha_pct) * src) / 100` formula renderer.rs already uses for
      damage tint is the obvious form -- ideally factored out to a
      shared helper rather than duplicated module-locally).

      ----------------------------------------------------------------
      Reads (no mutation):
        level.tiles, level.width, level.height (via level_data::is_wall);
        level.pickups (sprite source);
        player.pos, player.facing;
        player.damage_count (slice 3 -- damage tint overlay);
        enemies[*].pos, enemies[*].alive, enemies[*].pain_flash_remaining;
        fx.effects[*].kind, fx.effects[*].pos, fx.effects[*].end_pos
          (Tracer only), fx.effects[*].lifetime_remaining
          (all kinds: EnemyDeathFade / EnemyCorpse / BloodSplat / WallPuff
           / MuzzleFlash / Tracer);
        fx.pickup_tint_count (slice 3 -- pickup tint overlay).
      Does NOT read the per-frame frames counter, player.health,
      player.ammo, player.alive, enemy.health, enemy.state, or any
      other gameplay state. Writes the framebuffer; no other side
      effects.

      Module-private state:
        - column_angle_offset: [f32; WINDOW_WIDTH] -- precomputed
          angle table (slice 1, unchanged).
        - wall_depth: [f32; WINDOW_WIDTH] -- per-column wall-distance
          z-buffer (slice 2). Storage strategy is a Coder degree of
          freedom (stack-local array re-used per call, OnceLock-backed
          static, or lazy_static-style); all satisfy specs/45 § State
          ("rewritten end-to-end during the wall pass of every frame;
          never carries state between frames"). The same allocation
          choices as the angle-offset table apply here.
        - firing_active: bool -- per-frame derived state, computed
          once at the top of draw and consumed by Pass 1 wall shading,
          Pass 2 sprite shading (non-full-bright candidates), and
          Pass 3 muzzle flash overlay gate (slice 3).

      Determinism. raycaster::draw is a pure function of
      (level, player, enemies, fx) plus compile-time constants and
      the angle-offset table. specs/45 § Determinism details how this
      composes with specs/35's existing determinism chain. The sprite
      pass is order-deterministic IF the back-to-front sort uses a
      total-order comparator (forward_dist + a deterministic
      secondary tie-breaker). The slice-3 effects pass is fully
      deterministic -- no randomness, no time-based jitter; tracer
      end-point projection and overlay alpha mappings are pure
      functions of the read set above.

cross_module_borrows:
  - "&mut Vec<u32> (framebuffer; owned by main.rs)"
  - "&Level (read-only; level_data — also reads level.pickups)"
  - "&Player (read-only; player_state — slice 3 widens reads to include player.damage_count)"
  - "&[Enemy] (read-only; enemy_logic — slice 2)"
  - "&VisualEffects (read-only; visual_effects — slice 3 widens reads to all EffectKind variants AND fx.pickup_tint_count)"
notes: |
  Single consumer is main.rs in --render-mode=raycaster mode. Not
  consumed by any per-frame gameplay path (game_loop::update,
  autopilot::bot_step, enemy_logic::update, weapon_system::fire all
  stay unaware of this module). Slice 1 ships a walls-only renderer;
  slice 2 of the migration adds entity / sprite drawing inside this
  module's draw(); slice 3 adds the FPS-specific effects pass
  (muzzle flash / tracer / wall puff / extra-light bias / damage
  tint / pickup tint); slice 4 (this contract) swaps the HUD layout
  via a NEW renderer-side entry point (renderer::draw_hud_fps) --
  this module's signature and pass count are unchanged from slice 3
  because the FPS HUD strip lives in renderer.rs (it
  already owns the HUD digit font); slice 5 (now landed) flips the
  --render-mode default from topdown to raycaster, so this module
  runs by default; slice 6 removes the topdown code path. The
  held-weapon body sprite (originally scoped for slice 4 alongside
  the HUD) is deferred -- specs/45 § Implementation Status / Deferred.

  Dependency graph: depends_on
  [level_data, player_state, enemy_logic, visual_effects] --
  the same read-only borrows the existing top-down renderer takes
  except renderer also owns the COLOR_* table and depends on
  `presentation` for window dimensions. The raycaster reads color
  constants from renderer (constant import is the spec/80-acceptable
  cross-module dependency form; symbol-level only, no behavioral
  dependency on renderer's draw functions). No presentation
  dependency in module_plan terms, even though the module references
  presentation's WINDOW_WIDTH / WINDOW_HEIGHT public_constants —
  presentation is a constants-only sibling and the import is
  symbol-level, not behavioral; module_plan's depends_on is for
  regen-ordering closure rather than imports.

  Imported color and dimensional constants (specs/80 § API Surface
  "constant import is fine; struct import is not"):
    use crate::renderer::{COLOR_ENEMY, COLOR_PAIN_FLASH, COLOR_CORPSE,
                          COLOR_BLOOD, COLOR_PUFF, COLOR_MUZZLE_FLASH,
                          COLOR_TRACER, COLOR_DAMAGE_TINT,
                          COLOR_PICKUP_TINT,
                          PICKUP_HEALTH_OUTER_COLOR,
                          PICKUP_AMMO_COLOR, PICKUP_HEALTH_SIZE_PX,
                          PICKUP_AMMO_SIZE_PX,
                          DAMAGE_TINT_MAX_ALPHA_PCT};
    use crate::enemy_logic::ENEMY_RADIUS_TILES;
    use crate::visual_effects::{ENEMY_DEATH_FADE_DURATION,
                                ENEMY_CORPSE_RADIUS, BLOOD_RADIUS,
                                PUFF_RADIUS, PUFF_DURATION,
                                DAMAGE_TINT_CAP, DAMAGE_TINT_LEVELS,
                                PICKUP_TINT_CAP,
                                PICKUP_TINT_LEVEL_COUNT,
                                EffectKind, MUZZLE_OFFSET};
    use crate::level_data::TILE_SIZE;
  These are pure constant imports (plus the EffectKind enum, used
  in `kind == EffectKind::X` filters during the once-per-frame
  effect partition); raycaster does not call any function on these
  modules.

  PICKUP_TINT_MAX_ALPHA_PCT is referenced by the layer-6 alpha
  formula but is NOT pinned as a public constant in renderer's
  contract today; the Coder either (a) re-derives it inline (as
  renderer.rs does in the topdown path) or (b) lifts the existing
  topdown blend helper to a shared spot. Both are spec/80-acceptable.
  This is a pre-slice-3 documentation gap in renderer.yaml; not an
  authority gap in the Pickup Tint behavior, which spec/40 + spec/25
  pin completely (~30% max alpha).

  Coder degrees of freedom (per spec/80 § API Surface and
  _shared.yaml § coder_degrees_of_freedom):
    - Module-private helper shape for lerp_rgb / scale_rgb /
      blend_rgb / DDA step state (single struct vs. paired locals;
      iterator vs. while-loop). Whichever shape is picked, it MUST
      stay module-private.
    - Whether the angle-offset table is a OnceLock<[f32; W]> or a
      lazy_static-style helper or a function that recomputes per
      call. Same options apply to wall_depth[]. The deterministic-
      output guarantee is what the contract pins; the storage
      strategy is not.
    - Whether NS / EW shading uses 0.75 as a per-channel f32
      multiply or a fixed-point right-shift on packed u32 channels.
      Both produce the same visual-result tier within our
      framebuffer color depth.
    - Sort algorithm for the sprite pass (Vec::sort_by /
      sort_unstable_by / O(n²) selection sort). The total-order
      comparator on forward_dist is what the contract pins; the
      sort strategy is not.
    - Sprite-candidate collection storage (stack-local fixed-size
      array vs. module-private Vec reused across calls vs.
      per-frame Vec). The per-frame allocation invariant (specs/45
      § Invariants) eliminates per-call Vec::new(); the other two
      shapes both meet the contract.
    - Whether the side-cone early-out (RAYCASTER_SPRITE_SIDE_CONE_FACTOR)
      is applied or skipped in favor of always running the screen-x
      clip. Both are correctness-equivalent.
    - (Slice 3) Single iteration over fx.effects to partition
      candidates by kind (sprite-pass items + tracer list +
      firing_active flag), vs. three separate iterations. The
      once-per-frame compute is what the contract pins (specs/45
      § Extra-Light Bias rule 1); the iteration count is not.
    - (Slice 3) Muzzle flash overlay shape: filled disc vs. filled
      rectangle vs. (future) textured sprite. Disc is the obvious
      choice. Pins the screen-space anchor and full-bright color;
      shape is not.
    - (Slice 3) Tracer line algorithm: Bresenham vs. DDA vs. any
      single-pixel-line walker. The per-column z-test against
      wall_depth[] and the linear-interpolated tracer depth are
      what the contract pins; the walker is not.
    - (Slice 3) Whether the per-pixel damage / pickup tint blend
      shares a `blend_rgb` helper with renderer.rs (lifted to a
      shared spot, e.g. a `presentation` or `color` helper module)
      vs. duplicates the formula inline. Both meet spec/80 § API
      Surface; lifting is the cleaner shape but lifting touches
      renderer.rs, which is out of scope for slice 3 (the slice
      only edits raycaster). A future cleanup PR may unify.
