# level_data module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: level_data
file: src/level_data.rs
depends_on: []
public_types:
  - name: Vec2
    note: "Defined here; see shared_types.Vec2."
  - name: Tile
    note: "Defined here; see shared_types.Tile."
  - name: PickupKind
    note: "Defined here; see shared_types.PickupKind."
  - name: Pickup
    note: "Defined here; see shared_types.Pickup."
  - name: Archetype
    note: "Defined here; see shared_types.Archetype."
  - name: EnemySpawn
    note: "Defined here; see shared_types.EnemySpawn."
  - name: Level
    definition: |
      pub struct Level {
          pub width: usize,                  // GRID_WIDTH (20)
          pub height: usize,                 // GRID_HEIGHT (15)
          pub tiles: Vec<Vec<Tile>>,         // tiles[y][x]
          pub player_spawn: Vec2,            // tile coords (specs/25 § Level Layout)
          pub enemy_spawns: Vec<EnemySpawn>, // two entries in build_default; resolution order is index-tie-breaker for "enemy" target (specs/30 § Targets). Carries per-spawn archetype.
          pub exit: Vec2,                    // tile coords
          pub pickups: Vec<Pickup>,          // static pickups (specs/60)
      }
public_constants:
  - { name: TILE_SIZE,    type: f32,   value: "32.0", source: "specs/25 § Visual" }
  - { name: GRID_WIDTH,   type: usize, value: "20",   source: "specs/25 § Level Layout" }
  - { name: GRID_HEIGHT,  type: usize, value: "15",   source: "specs/25 § Level Layout" }
  - { name: EXIT_RADIUS,  type: f32,   value: "1.0",  source: "specs/25 § Win/Lose" }
  - { name: PICKUP_RADIUS_TILES, type: f32, value: "1.0", source: "specs/25 § Pickups (knowledge-backed: § Pickup Touch Detection 16+16=32 units = 1 tile)" }
public_methods:
  - signature: "pub fn build_default() -> Level"
    notes: |
      Hardcoded layout from specs/25 § Level Layout: 20x15, all-edge wall
      border. Three interior wall segments:
        - vertical central divider, x=10, y=3..8
        - mid-left horizontal, y=7, x=4..9
        - SE pocket cover, y=10, x=13..15 (Rust half-open: x=13, 14)
      Player spawn (2.5, 2.5); two enemy spawns in resolution order
      (both Archetype::BasicTrooper for byte-identical replay with
      slice 1):
        enemy_spawns: vec![
          EnemySpawn { pos: Vec2::new(17.5, 12.5), archetype: Archetype::BasicTrooper },
          EnemySpawn { pos: Vec2::new(4.5, 11.5),  archetype: Archetype::BasicTrooper },
        ]
      exit (17.5, 2.5). No I/O.
      Pickups (specs/25 § Pickups § Default Level Placement):
        pickups: vec![
          Pickup { kind: PickupKind::Health,      pos: Vec2::new(5.5, 12.5), active: true },
          Pickup { kind: PickupKind::Health,      pos: Vec2::new(12.5, 4.5), active: true },
          Pickup { kind: PickupKind::AmmoBullets, pos: Vec2::new(15.5, 7.5), active: true },
          Pickup { kind: PickupKind::ArmorGreen,  pos: Vec2::new(8.5, 12.5), active: true },
          Pickup { kind: PickupKind::ArmorBlue,   pos: Vec2::new(3.5, 4.5),  active: true },
        ]
      The ArmorGreen / ArmorBlue spawns were added in the 2026-05-14
      armor slice (specs/25 § Pickups § Default Level Placement).
      The `AmmoBullets` variant was renamed from the pre-2026-05-18
      `Ammo` variant when the per-category ammo split landed; the
      pickup at (15.5, 7.5) is unchanged in position, sprite color
      (yellow), and consumption effect (grants 10 bullets) — only
      the variant name reflects the now-explicit category. No shell
      pickup is seeded in the default level (the variant is exercised
      via the ShellPickup demo level + tests/combat/shell_pickup.yaml).
      Demo levels (level_generator) deliberately keep
      `pickups: vec![]` for visual clarity and do not need armor
      pickups; the autopilot scenario tests/combat/armor_absorbs_damage.yaml
      uses the default level to exercise the armor system end-to-end.
      Default-level archetype choice: both spawns are BasicTrooper so
      existing `--autopilot` scenarios that consume the default level
      (kill_enemy, scavenge_run, reach_exit, complete_level) replay
      byte-identically with the multi-archetype refactor. The shotgun
      trooper archetype is exercised via the `ShotgunStandoff` demo
      level (specs/15) and the `level_generator` + `enemy_logic` unit
      tests; the planned autopilot fixture
      `tests/combat/shotgun_trooper_salvo.yaml` is **deferred** (see
      specs/15 § Implementation Status). Not exercised via the
      default level either way.
  - signature: "pub fn is_wall(level: &Level, tile_x: i32, tile_y: i32) -> bool"
    notes: |
      Boundary-safe. Out-of-bounds (negative or >= width/height) returns
      true (treats outside the grid as solid wall). Used by player
      collision (player_state) and weapon ray-march (weapon_system).
cross_module_borrows: []
notes: |
  Owner of Vec2, Tile, PickupKind, Pickup, Archetype, and EnemySpawn
  shared types. No deps; first to generate. EXIT_RADIUS lives here
  because game_loop's win check is `player.pos.distance_to(level.exit)
  < EXIT_RADIUS` -- the level owns the exit geometry, not the loop.

  The Archetype enum lives here (not in enemy_logic) because
  level_data is the zero-dep module that owns the "what kind of
  entity does a Level place" tagged unions — Pickup/PickupKind
  already live here for the same reason. enemy_logic depends on
  level_data and imports Archetype to store on Enemy and to drive
  per-archetype lookups. Moving Archetype to enemy_logic would
  require level_data to depend on enemy_logic for the EnemySpawn
  record, inverting the dependency graph.
