  - { name: RAYCASTER_HUD_ARMOR_COLOR_NONE,        type: u32, value: "0x606060", source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout — reuses HUD_ARMOR_COLOR_NONE (Generation default)" }
  - { name: RAYCASTER_HUD_ARMOR_COLOR_GREEN,       type: u32, value: "0x20C020", source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout — reuses HUD_ARMOR_COLOR_GREEN (Generation default)" }
  - { name: RAYCASTER_HUD_ARMOR_COLOR_BLUE,        type: u32, value: "0x2060E0", source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout — reuses HUD_ARMOR_COLOR_BLUE (Generation default)" }
  - { name: RAYCASTER_HUD_ARMOR_ICON_PX,           type: i32, value: "16",       source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — same size as health/ammo icons for visual symmetry)" }
  - { name: RAYCASTER_HUD_WEAPON_COLOR,            type: u32, value: "0xB0B0B0", source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — single-weapon icon collapses the reference's 6-slot weapons-owned subpanel; mid-gray reads as 'tool / equipment')" }
  - { name: RAYCASTER_HUD_HEALTH_ICON_PX,          type: i32, value: "16",       source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — sized to ~80% of the digit on-screen height)" }
  - { name: RAYCASTER_HUD_HEALTH_ICON_THICKNESS_PX,type: i32, value: "4",        source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — 1/4 of icon width; mirrors PICKUP_HEALTH_INNER_THICKNESS_PX ratio)" }
  - { name: RAYCASTER_HUD_AMMO_ICON_PX,            type: i32, value: "16",       source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — same as HEALTH_ICON_PX for visual symmetry)" }
  - { name: RAYCASTER_HUD_WEAPON_ICON_W_PX,        type: i32, value: "48",       source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — wider than tall to suggest a horizontal pistol silhouette)" }
  - { name: RAYCASTER_HUD_WEAPON_ICON_H_PX,        type: i32, value: "16",       source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — same height as HEALTH_ICON_PX for visual symmetry)" }
  # No FPS crosshair constants: the reference renders no first-person
  # crosshair (knowledge/raycaster_hud.md § On-View Crosshair — Absent in
  # the Reference's First-Person View) and slice 4 follows the reference.
  # See specs/45 § Reference-Faithful No-Crosshair Choice. An opt-in port
  # crosshair would re-introduce ARM_LEN_PX / GAP_PX / THICKNESS_PX /
  # COLOR constants here citing knowledge § Recommended Crosshair Shape
  # for a Port.
  # NOTE: HUD_* layout/font/band constants from the topdown HUD workflow
  # are renderer-private and NOT contracted here. Their authoritative
  # source is `specs/25 § HUD`; the renderer module's source file is the
  # wire-up checked by Reconciler against that section. The same applies
  # to the FPS HUD's per-pane internal layout: the public_constants
  # above are the framebuffer-coordinate anchors; the per-pane
  # icon-then-digits compositing is renderer-internal and not
  # contracted as a public symbol.
public_methods:
  - signature: |
      pub fn draw(
          framebuffer: &mut Vec<u32>,
          level: &Level,
          player: &Player,
          enemies: &[Enemy],
          fx: &VisualEffects,
          game_over: Option<bool>,  // None = playing, Some(true) = won, Some(false) = lost
      )
    notes: |
      Top-down render entry point. Used by main.rs only when
      --render-mode=topdown (a debug-only alternate mode permanently
      retained for development use after slice 5 flipped the default
      to raycaster -- specs/00 § Phase 1, specs/45, _shared.yaml §
      main_cli § render_mode). In --render-mode=raycaster, main.rs
      calls raycaster::draw followed by renderer::draw_hud and (if
      game_over.is_some()) renderer::draw_game_over_border instead —
      see those entries below.
      Layer order (back to front, per spec/40 § Effect Layering and
      spec/60 § Pickup Rendering / spec/50 § Render Order Update):
        1. Floor + walls (level tiles).
        2. Exit marker (cyan X) and corpses.
        2.5. Active pickups (specs/60 § Pickup Rendering):
              iterate level.pickups; skip !active. Dispatch on
              pickup.kind:
                Health      → filled square in PICKUP_HEALTH_OUTER_COLOR
                              (PICKUP_HEALTH_SIZE_PX) with a centered
                              cross in PICKUP_HEALTH_INNER_COLOR
                              (PICKUP_HEALTH_INNER_THICKNESS_PX wide).
                AmmoBullets → filled square in PICKUP_AMMO_COLOR
                              (PICKUP_AMMO_SIZE_PX). Yellow.
                AmmoShells  → filled square in PICKUP_SHELL_COLOR
                              (PICKUP_SHELL_SIZE_PX). Warm orange.
                              Added 2026-05-18 ammo-split slice.
                ArmorGreen  → filled square in PICKUP_ARMOR_GREEN_COLOR
                              (PICKUP_ARMOR_SIZE_PX). No inner detail.
                ArmorBlue   → filled square in PICKUP_ARMOR_BLUE_COLOR
                              (PICKUP_ARMOR_SIZE_PX). No inner detail.
              Armor variants added in the 2026-05-14 armor slice.
              AmmoBullets renamed from the pre-2026-05-18 single-pool
              `Ammo` variant; AmmoShells is new in the same slice.
        3. Blood splats and wall puffs.
        4. Tracer lines.
        5. Muzzle flashes.
        6. Live enemies (pain-flashed body color when
           enemy.pain_flash_remaining > 0, else COLOR_ENEMY).
        7. Player disc + direction line.
        8. Player damage tint overlay if level > 0:
             level = ((player.damage_count * DAMAGE_TINT_LEVELS as f32)
                      / DAMAGE_TINT_CAP).ceil() as u32;
             level = level.min(DAMAGE_TINT_LEVELS);
             alpha_pct = (DAMAGE_TINT_MAX_ALPHA_PCT * level)
                          / DAMAGE_TINT_LEVELS;
             software-blend COLOR_DAMAGE_TINT into framebuffer at
             alpha_pct.
        8.5. Pickup tint overlay if fx.pickup_tint_count > 0.0
             (specs/40 § Pickup Tint Screen Flash):
             pickup_level = ceil(fx.pickup_tint_count
                                 * PICKUP_TINT_LEVEL_COUNT / PICKUP_TINT_CAP);
             pickup_level = pickup_level.min(PICKUP_TINT_LEVEL_COUNT);
             if pickup_level > 0: software-blend COLOR_PICKUP_TINT at
             (PICKUP_TINT_MAX_ALPHA_PCT * pickup_level / PICKUP_TINT_LEVEL_COUNT).
        9. HUD pane (specs/50 § Health Pane, § Ammo Pane, § Armor Pane):
           health bar + digits in top-left corner, ammo pane
           (icon + digits, weapon-aware — see draw_hud notes below for
           the dispatch on weapon_system::PISTOL_AMMO_CATEGORY)
           directly below, armor pane (per-tier-colored icon + digits)
           directly below the ammo pane (added 2026-05-14 armor slice).
           Weapon-aware ammo dispatch added 2026-05-18 ammo-split slice.
        10. Game-over border if game_over.is_some()
           (green tint for win, red for lose; thickness
           GAME_OVER_BORDER_PX).
      The renderer reads visual_effects (including fx.pickup_tint_count),
      player.damage_count, player.health, player.bullets,
      player.shells (added 2026-05-18 ammo-split slice; consumed only
      via the weapon-aware ammo-pane dispatch), player.armor,
      player.armor_type (added 2026-05-14 armor slice for the armor
      pane), level.pickups (renderer dispatches on pickup.kind for
      the AmmoBullets and AmmoShells variants — see layer 2.5 above),
      enemy.pain_flash_remaining (live-enemy pain-flash color
      override), and enemy.alive (live vs. corpse skip). It does NOT
      mutate any other module's state. The death-fade interpolation reads
      `eff.lifetime_remaining / ENEMY_DEATH_FADE_DURATION` from the
      VisualEffects entry pushed by spawn_enemy_death_fade — NOT
      enemy.death_fade_remaining (which is a parallel timer on Enemy
      gating corpse-marker spawn in enemy_logic, not consumed by
      renderer). Both timers tick at dt in lockstep so the visual
      result matches; the contract pin is "renderer reads the Effect's
      lifetime", not "renderer reads the Enemy's timer". Captured
      2026-05-09 reconcile after `initial_lifetime` field removal made
      the divisor a plain constant.
  - signature: "pub fn make_framebuffer() -> Vec<u32>"
    notes: |
      Allocates Vec::from_iter([0u32; WINDOW_WIDTH * WINDOW_HEIGHT]).
      Helper so main.rs doesn't need to import WINDOW_WIDTH etc.
      itself.
  - signature: |
      pub fn draw_hud(framebuffer: &mut Vec<u32>, player: &Player)
    notes: |
      Draws ONLY the topdown HUD layer (specs/50): top-left health
      bar + digits, ammo pane below, armor pane below ammo, in the
      same pixel position and same color rules used by the monolithic
      `draw` above (its layer 9). The monolithic `draw` function may
      also call this helper internally to avoid duplicating the
      HUD-drawing code; that is a Coder degree of freedom.

      Armor pane (added 2026-05-14 armor slice — specs/50 § Armor Pane):
        anchor = (HUD_MARGIN,
                  HUD_MARGIN + HUD_HEALTH_BAR_HEIGHT_PX
                  + HUD_PANE_GAP_PX     // bar -> ammo
                  + HUD_AMMO_ICON_PX
                  + HUD_PANE_GAP_PX);   // ammo -> armor
        icon: filled square HUD_ARMOR_ICON_PX × HUD_ARMOR_ICON_PX in
              the tier-dispatched color:
                ArmorTier::None  -> HUD_ARMOR_COLOR_NONE   (gray)
                ArmorTier::Green -> HUD_ARMOR_COLOR_GREEN
                ArmorTier::Blue  -> HUD_ARMOR_COLOR_BLUE
        digits: render player.armor (u8) as decimal in the SAME
                tier color the icon uses, HUD_PANE_GAP_PX right of
                the icon. No leading zeros, `0` special-cased
                (knowledge/hud.md § Numeric Widget). Always drawn —
                including when armor == 0 (renders `0` in
                HUD_ARMOR_COLOR_NONE).

      As of slice 4, this function is consumed ONLY by
      --render-mode=topdown's monolithic draw path. The raycaster mode
      uses draw_hud_fps (below) instead. Pre-slice-4 contract had
      raycaster mode consuming this function for HUD overlay; that
      call site moved to draw_hud_fps in slice 4 (specs/45 § HUD Mode
      Dispatch).

      Ammo pane is **weapon-aware** as of the 2026-05-18 ammo-split
      slice (specs/50 § Ammo Pane). Dispatch:
        let category = weapon_system::PISTOL_AMMO_CATEGORY;  // = AmmoCategory::Bullets
        let (value, color) = match category {
            AmmoCategory::Bullets => (player.bullets, HUD_AMMO_COLOR),
            AmmoCategory::Shells  => (player.shells,  HUD_AMMO_COLOR), // future HUD_SHELL_COLOR, deferred
        };
      The icon (HUD_AMMO_ICON_PX × HUD_AMMO_ICON_PX filled square in
      `color`) is drawn first, then the digits render `value` in the
      same `color`. With pistol as the only weapon the dispatch is
      constant (`Bullets → player.bullets → HUD_AMMO_COLOR`) — visual
      output is byte-identical to the pre-slice HUD ammo pane. The
      Coder MAY hard-code the Bullets arm (simplest, future-extension
      via a match arm), OR write the match upfront (more future-proof
      when the shotgun ships). Both shapes meet the contract; the pin
      is "ammo pane reads via weapon_system::PISTOL_AMMO_CATEGORY".

      Reads (no mutation): player.health, player.bullets, player.shells,
      player.armor, player.armor_type. Writes the framebuffer.
  - signature: |
      pub fn draw_hud_fps(framebuffer: &mut Vec<u32>, player: &Player)
    notes: |
      Slice-4 FPS HUD entry point (specs/45 § FPS HUD Layout). Draws,
      in order. No on-view crosshair is drawn — the reference renders
      none in its first-person view (knowledge/raycaster_hud.md § On-
      View Crosshair — Absent in the Reference's First-Person View) and
      slice 4 follows the reference; see specs/45 § Reference-Faithful
      No-Crosshair Choice.
        1. Bottom chrome strip background (specs/45 § Bottom Chrome
           Strip). A solid RAYCASTER_HUD_STRIP_COLOR rectangle
           covering rows
             [WINDOW_HEIGHT - RAYCASTER_HUD_STRIP_HEIGHT_PX,
              WINDOW_HEIGHT)
           = [400, 480) at full WINDOW_WIDTH. Overwrites whatever
           world / effect content the previous passes wrote into
           those rows.
        2. Health pane: a red plus-cross icon + the player's health
           digits (specs/45 § Health Pane). Icon at
             (RAYCASTER_HUD_PANE_X_HEALTH,
              RAYCASTER_HUD_STRIP_TOP_Y + ...)
           where the y-coordinate vertically centers the icon /
           digits in the strip. Icon shape: a plus-cross of size
           RAYCASTER_HUD_HEALTH_ICON_PX × RAYCASTER_HUD_HEALTH_ICON_PX,
           arm thickness RAYCASTER_HUD_HEALTH_ICON_THICKNESS_PX,
           color RAYCASTER_HUD_HEALTH_COLOR. Digits: render
           player.health.max(0) as decimal in
           RAYCASTER_HUD_HEALTH_COLOR using the renderer-private
           HUD_DIGIT_GLYPHS table at RAYCASTER_HUD_DIGIT_PIXEL_SIZE
           pixel scale, no leading zeros, zero-special-cased,
           starting HUD_PANE_GAP_PX to the right of the icon (left-
           aligned; right-justification is deferred per specs/45 §
           Implementation Status / Deferred).
           NO per-value-threshold coloring: health at 5% renders the
           same red as health at 95% (knowledge raycaster_hud.md §
           Color Treatment).
        3. Ammo pane (specs/45 § Ammo Pane): a colored square icon +
           the equipped weapon's pool digits. The pane is
           **weapon-aware** as of the 2026-05-18 ammo-split slice —
           same dispatch as the topdown draw_hud's ammo pane above:
             let category = weapon_system::PISTOL_AMMO_CATEGORY;  // = AmmoCategory::Bullets
             let (value, color) = match category {
                 AmmoCategory::Bullets => (player.bullets, RAYCASTER_HUD_AMMO_COLOR),
                 AmmoCategory::Shells  => (player.shells,  RAYCASTER_HUD_AMMO_COLOR), // future RAYCASTER_HUD_SHELL_COLOR, deferred
             };
           Icon at
             (RAYCASTER_HUD_PANE_X_AMMO, ...)
           Shape: a filled square
             RAYCASTER_HUD_AMMO_ICON_PX × RAYCASTER_HUD_AMMO_ICON_PX
           in `color`. Digits: render `value` as decimal in `color`
           using the same font + scale rules as the health pane.
           Always drawn, including when the dispatched pool reads 0.
           With pistol as the only weapon the dispatch is constant
           (`Bullets → player.bullets → RAYCASTER_HUD_AMMO_COLOR`) —
           visual output is byte-identical to the pre-slice FPS HUD
           ammo pane.
        3.5. Armor pane (added 2026-05-14 armor slice — specs/45
           § Armor Pane): a tier-dispatched-color square icon + the
           player's armor digits. Icon at
             (RAYCASTER_HUD_PANE_X_ARMOR, ...)
           Shape: a filled square
             RAYCASTER_HUD_ARMOR_ICON_PX × RAYCASTER_HUD_ARMOR_ICON_PX
           in the per-tier color picked from player.armor_type:
             ArmorTier::None  -> RAYCASTER_HUD_ARMOR_COLOR_NONE  (gray)
             ArmorTier::Green -> RAYCASTER_HUD_ARMOR_COLOR_GREEN
             ArmorTier::Blue  -> RAYCASTER_HUD_ARMOR_COLOR_BLUE
           Digits: render player.armor (u8) as decimal in the SAME
           tier color the icon uses, HUD_PANE_GAP_PX right of the
           icon. No leading zeros, `0` special-cased. Always drawn,
           including when armor == 0 (renders `0` in
           RAYCASTER_HUD_ARMOR_COLOR_NONE). NO per-value-threshold
           coloring within a tier — armor at 1 point and at 200
           points render in the same tier color (knowledge
           raycaster_hud.md § Color Treatment).
        4. Weapon icon: a static gray weapon-shape silhouette
           (specs/45 § Weapon Icon Pane) at
             (RAYCASTER_HUD_PANE_X_WEAPON, ...)
           Default shape: a single filled rectangle of size
             RAYCASTER_HUD_WEAPON_ICON_W_PX × RAYCASTER_HUD_WEAPON_ICON_H_PX
           in RAYCASTER_HUD_WEAPON_COLOR. Coder MAY emit a multi-rect
           silhouette (e.g. T-shape with grip, two-rectangle barrel +
           grip) without changing the contract — the constants pin
           the bounding box; the silhouette inside it is a Coder
           degree of freedom. Static across all frames.

      Reads (no mutation): player.health, player.bullets,
      player.shells, player.armor, player.armor_type. Writes the
      framebuffer. Reuses the renderer-private HUD_DIGIT_GLYPHS table
      (specs/50 § State); no new font is added.

      Used by main.rs in --render-mode=raycaster after raycaster::draw
      fills the framebuffer (specs/45 § Interactions § With renderer
      (top-down)). NOT consumed by --render-mode=topdown — the
      topdown path keeps draw_hud (or the monolithic draw) for its
      HUD layer (specs/45 § HUD Mode Dispatch).

      Coder degrees of freedom (slice 4):
        - The exact pistol silhouette (single rectangle, T-shape,
          two-rectangle barrel + grip) — see § Weapon Icon Pane.
        - Whether the strip background and per-pane sub-orderings
          are inlined sequentially in draw_hud_fps or split into
          private helpers (draw_strip,
          draw_health_pane, draw_ammo_pane, draw_weapon_icon).
          Both shapes meet the spec; private helpers are the
          obvious refactor for readability but not required.
        - Whether the icon plus-cross of the health pane reuses the
          private helper that already draws the on-map health
          pickup's red cross (renderer.rs internal — not contracted
          as a public symbol; specs/60 § Pickup Rendering owns the
          on-map version). Both reusing and re-implementing meet
          the spec; reuse is the cleaner shape.
  - signature: |
      pub fn draw_game_over_border(framebuffer: &mut Vec<u32>, won: bool)
    notes: |
      Draws ONLY the game-over border (the colored frame around the
      viewport — specs/25 § Visual): green tint for win
      (GAME_OVER_BORDER_WIN_COLOR), red for lose
      (GAME_OVER_BORDER_LOSE_COLOR), thickness GAME_OVER_BORDER_PX.
      Used by main.rs in --render-mode=raycaster after draw_hud
      when the per-frame game_over Option<bool> is Some(_)
      (_shared.yaml § main_cli § render_mode dispatch).

      The monolithic `draw` function may also call this helper
      internally; same Coder-degree-of-freedom note as draw_hud
      above. The visual result is identical between modes
      (specs/45 § Constraints).
cross_module_borrows:
  - "&mut Vec<u32> (the framebuffer is owned by main.rs/game_loop)"
  - "&Level, &Player, &[Enemy], &VisualEffects (all read-only)"
notes: |
  Renderer owns the COLOR_* table to keep specs/25 § Visual values
  from being duplicated (per intentionally_unspecified note below).
  All RGB constants are declared local because the renderer is the
  single consumer.

  --render-mode dispatch (specs/45, _shared.yaml § main_cli §
  render_mode): this module is the world-layer renderer for
  --render-mode=topdown (a debug-only alternate mode permanently
  retained after the slice-5 default flip; specs/00 § Phase 1), and
  contributes the HUD layer + game-over border layer only in
  --render-mode=raycaster (via draw_hud / draw_game_over_border above;
  the world layer is owned by the raycaster module in that mode). The
  Coder may either:
    (a) split the monolithic `draw` into draw_world + draw_hud +
        draw_game_over_border helpers and have `draw` compose all
        three, OR
    (b) keep the monolithic `draw` as-is for the topdown path and
        only export draw_hud / draw_game_over_border as
        independently-callable public entry points.
  Either shape is contracted-equivalent; the visual layer order
  must remain back-to-front (world → HUD → game-over border) and
  must produce byte-equal pixels in --render-mode=topdown to the
  pre-slice-1 behavior. Slice 1 acceptance is "topdown is
  byte-for-byte unchanged" (specs/45 § Invariants).
