  - { name: RAYCASTER_HUD_PANE_X_ARMOR,            type: i32, value: "384",      source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — inserted between ammo and weapon panes by the 2026-05-14 armor slice)" }
  - { name: RAYCASTER_HUD_PANE_X_WEAPON,           type: i32, value: "480",      source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (Generation default — rightmost pane anchor; unchanged by the 2026-05-14 armor-slice insertion)" }
  - { name: RAYCASTER_HUD_HEALTH_COLOR,            type: u32, value: "0xD00000", source: "specs/25 § Renderer (Raycaster) / FPS HUD Layout (knowledge-backed: knowledge/raycaster_hud.md § Bottom-Strip Palette Reference — 'Tall-digit red: a saturated red roughly in the (200, 0, 0) – (220, 0, 0) range')" }
