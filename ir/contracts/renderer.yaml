# renderer module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: renderer
file: src/renderer.rs
depends_on: [presentation, visual_effects]
public_types:
  - name: ArmorTier
    note: "Consumed (read-only); see shared_types.ArmorTier. draw_hud (topdown HUD § Armor Pane) and draw_hud_fps (raycaster HUD § Armor Pane) dispatch icon and digit colors on the tier variant."
  - name: AmmoCategory
    note: "Consumed (read-only); see shared_types.AmmoCategory. draw_hud (topdown HUD § Ammo Pane) and draw_hud_fps (raycaster HUD § Ammo Pane) read weapon_system::PISTOL_AMMO_CATEGORY (which equals AmmoCategory::Bullets) and dispatch on the value to pick which pool to display: Bullets → player.bullets in HUD_AMMO_COLOR (yellow); Shells → player.shells in a future HUD_SHELL_COLOR (deferred — lands with the shotgun). With pistol as the only weapon the dispatch is constant; the slice's runtime materialises a one-entry table but the dispatch machinery is what's contracted."
public_constants:
