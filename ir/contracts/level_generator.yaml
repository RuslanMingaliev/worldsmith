# level_generator module contract.
# Shard of the previous ir/module_contracts.yaml; cross-module types and
# orchestration sections live in ir/contracts/_shared.yaml.
name: level_generator
file: src/level_generator.rs
depends_on: [level_data]
public_types:
  - name: DemoLevelKind
    definition: |
      #[derive(Debug, Clone, Copy, PartialEq, Eq, serde::Deserialize)]
      #[serde(rename_all = "snake_case")]
      pub enum DemoLevelKind {
          LocalChaseObstacle,
          KiteMelee,
          RangedStandoff,
          ShotgunStandoff,
      }
    notes: |
      Public because autopilot::Scenario.level holds
      Option<DemoLevelKind> (specs/15 § Scenario YAML Extension), so
      serde_yaml can deserialize the YAML name directly into the
      enum. `rename_all = "snake_case"` maps `LocalChaseObstacle`
      -> `local_chase_obstacle`, `KiteMelee` -> `kite_melee`,
      `RangedStandoff` -> `ranged_standoff`, and `ShotgunStandoff`
      -> `shotgun_standoff` for YAML readability.
      Adding a new demo level: add one variant here and one match arm
      in build() below; nothing else changes.

      `ShotgunStandoff` was added in the 2026-05-13 combat slice 2
      (specs/25 § Enemy § Per-archetype constants) to exercise the
      shotgun trooper end-to-end without modifying the default level
      (which would break byte-identical replay of existing scenarios).
      See specs/15 § ShotgunStandoff for the layout and rationale.
public_constants: []
public_methods:
  - signature: "pub fn build(kind: DemoLevelKind) -> Level"
    notes: |
      Pure function: same `kind` always returns a byte-equal Level.
      No I/O, no randomness, no global state. Per specs/15 §
      Determinism this purity is the spec's full contribution to the
      determinism contract; everything else (RNG seeds, fixed dt,
      frame recording format) is already pinned by specs/35.
      Implementation pattern (one match arm per variant):
        match kind {
            DemoLevelKind::LocalChaseObstacle => build_local_chase_obstacle(),
            DemoLevelKind::KiteMelee          => build_kite_melee(),
            DemoLevelKind::RangedStandoff     => build_ranged_standoff(),
            DemoLevelKind::ShotgunStandoff    => build_shotgun_standoff(),
        }
      where each helper is a private function returning the Level
      layout pinned in specs/15 § <variant>.
  - signature: "fn build_local_chase_obstacle() -> Level"
    notes: |
      Module-private. Builds the LocalChaseObstacle layout from
      specs/15 § LocalChaseObstacle. Concretely:
        width = GRID_WIDTH (20); height = GRID_HEIGHT (15);
        tiles[y][x] = Wall iff (x == 0 || x == 19 || y == 0 || y == 14
                      || (x == 10 && (4..=10).contains(&y)))
                      else Floor;
        player_spawn = Vec2::new(3.5, 7.5);
        enemy_spawns = vec![
          EnemySpawn { pos: Vec2::new(16.5, 7.5),
                       archetype: Archetype::BasicTrooper },
        ];
        exit         = Vec2::new(1.5, 1.5);
        pickups      = vec![];   // no pickups
      Reuses GRID_WIDTH / GRID_HEIGHT from level_data; does not
      introduce new constants. Coder may inline the layout (one
      double-loop over the grid is the obvious form) or use a small
      helper -- the *Level* it produces is what matters.
      The BasicTrooper archetype is per scope ("Do NOT change demo
      levels ('LocalChaseObstacle', 'KiteMelee') to use the shotgun
      trooper").
  - signature: "fn build_kite_melee() -> Level"
    notes: |
      Module-private. Builds the KiteMelee layout from specs/15 §
      KiteMelee. Concretely:
        width = GRID_WIDTH (20); height = GRID_HEIGHT (15);
        tiles[y][x] = Wall iff (x == 0 || x == 19 || y == 0 || y == 14)
                      else Floor;
        player_spawn = Vec2::new(4.5, 7.5);
        enemy_spawns = vec![
          EnemySpawn { pos: Vec2::new(6.0, 7.5),
                       archetype: Archetype::BasicTrooper },
        ];
        exit         = Vec2::new(1.5, 1.5);
        pickups      = vec![];   // no pickups
      No interior walls. Distance from player_spawn to the lone
      enemy_spawn is 1.5 tiles -- inside BOT_KITE_RANGE (2.0,
      specs/25 § Autopilot) so the bot enters kite mode on frame 1,
      and outside ENEMY_CONTACT_RANGE_TILES (0.8125, specs/25 §
      Enemy) so the bot has buffer to back-pedal before contact
      damage starts. The BasicTrooper archetype is per scope ("Do
      NOT change demo levels ('LocalChaseObstacle', 'KiteMelee') to
      use the shotgun trooper").
  - signature: "fn build_ranged_standoff() -> Level"
    notes: |
      Module-private. Builds the RangedStandoff layout from specs/15
      § RangedStandoff. Concretely:
        width = GRID_WIDTH (20); height = GRID_HEIGHT (15);
        tiles[y][x] = Wall iff (x == 0 || x == 19 || y == 0 || y == 14)
                      else Floor;
        player_spawn = Vec2::new(4.5, 7.5);
        enemy_spawns = vec![
          EnemySpawn { pos: Vec2::new(12.5, 7.5),
                       archetype: Archetype::BasicTrooper },
        ];
        exit         = Vec2::new(1.5, 1.5);
        pickups      = vec![];   // no pickups
      No interior walls. Distance from player_spawn to the lone
      enemy_spawn is 8.0 tiles -- well outside BOT_KITE_RANGE (2.0)
      so the bot does not enter kite mode at frame 0, and ~10x
      ENEMY_CONTACT_RANGE_TILES (0.8125) so the trooper cannot
      contact-damage the player from spawn. The trooper has direct
      LoS along y = 7.5 (open arena), so its Attack-state hitscan
      is the only source of player damage during the bot's `wait:`
      objective. Within ENEMY_ATTACK_RANGE_TILES (64.0) so the
      trooper can fire from spawn without range-gating. The
      BasicTrooper archetype is the variant this level was designed
      to exercise (specs/15 § RangedStandoff "Purpose. A short
      scenario that exercises the basic trooper's ranged hitscan
      attack").
  - signature: "fn build_shotgun_standoff() -> Level"
    notes: |
      Module-private. Builds the ShotgunStandoff layout from
      specs/15 § ShotgunStandoff. Concretely:
        width = GRID_WIDTH (20); height = GRID_HEIGHT (15);
        tiles[y][x] = Wall iff (x == 0 || x == 19 || y == 0 || y == 14)
                      else Floor;
        player_spawn = Vec2::new(4.5, 7.5);
        enemy_spawns = vec![
          EnemySpawn { pos: Vec2::new(8.5, 7.5),
                       archetype: Archetype::ShotgunTrooper },
        ];
        exit         = Vec2::new(1.5, 1.5);
        pickups      = vec![];   // no pickups
      No interior walls. Distance from player_spawn to the lone
      enemy_spawn is 4.0 tiles -- outside BOT_KITE_RANGE (2.0) so
      the bot does not enter kite mode at frame 0, outside
      ENEMY_CONTACT_RANGE_TILES (0.8125) by ~5x so the trooper
      cannot contact-damage the player from spawn, and close
      enough that a meaningful number of pellets from each 3-pellet
      salvo land on the player (knowledge/enemy_types.md § Shotgun
      Variant — "the cone is tight vertically and wide horizontally,
      so the salvo 'fans out' sideways as range grows"). At 4 tiles
      the ±22° per-pellet horizontal spread cone produces a
      half-width of ~1.6 tiles around the aim direction, and the
      triangular distribution concentrates pellets near aim — the
      typical salvo lands 1-2 pellets on a player-sized target.
      Within ENEMY_ATTACK_RANGE_TILES (64.0) so the trooper fires
      from spawn without range-gating. The ShotgunTrooper archetype
      is exercised here without modifying the default level or
      either of the existing LocalChaseObstacle / KiteMelee demos
      (per the slice-2 task scope).
cross_module_borrows: []
notes: |
  Consumed by main.rs at startup (one call per --autopilot launch
  whose scenario sets `level: <name>`) and by autopilot for the
  `DemoLevelKind` type only (Scenario.level is
  Option<DemoLevelKind>). NOT consumed by any per-frame path:
  game_loop::update, autopilot::bot_step, enemy_logic::update,
  weapon_system::fire all stay unaware of this module. This keeps
  the generator out of gameplay runtime per the issue's
  "Generator must not be part of gameplay runtime logic" constraint.

  Determinism: build() is a pure function; identical inputs produce
  byte-equal Level structs. Demo recordings inherit determinism
  from specs/35 § Determinism (fixed dt, fixed RNG seeds, fixed
  framebuffer format) plus this purity guarantee — no scenario-RNG
  shenanigans needed.
