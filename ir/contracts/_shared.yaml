# -----------------------------------------------------------------------------
# Shared low-level types
# -----------------------------------------------------------------------------
# Defined ONCE in their home module. All other modules `use crate::<home>::<T>`.
# Coders MUST NOT redefine these in other modules.
shared_types:
  - name: Vec2
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug, Default, PartialEq)]
      pub struct Vec2 {
          pub x: f32,
          pub y: f32,
      }
    public_methods: |
      pub fn new(x: f32, y: f32) -> Self
      pub fn length(self) -> f32
      pub fn distance_to(self, other: Vec2) -> f32
      // #[cfg(test)] only:
      pub fn normalize(self) -> Vec2
    notes: |
      Coordinates are in tile units (one Tile::Wall cell = 1.0). See
      specs/21 § Implementation Notes. distance_to is (a - b).length().
      `dot` and `normalize` are NOT in the released public surface —
      enemy_logic chase movement inlines the dx/dist division rather
      than calling normalize(), so the only consumer of normalize() is
      a #[cfg(test)] zero-vector unit test. Spec/80 § API Surface
      "no dead pub exports" mandates a #[cfg(test)] gate on the impl
      in that case. normalize() of a near-zero vector returns
      Vec2::default() (no NaN). Reintroduce as released-public when an
      in-crate non-test caller materialises (e.g. LoS dot-product
      optimization for `dot`, or chase-direction unification for
      `normalize`).

  - name: Tile
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug, PartialEq, Eq)]
      pub enum Tile {
          Floor,
          Wall,
      }
    notes: |
      Two-state enum is sufficient for the current static level
      (specs/25 § Level Layout). Door tiles are deferred. Pickups
      are NOT modeled as tiles; they live as Pickup entities in
      Level::pickups (see PickupKind / Pickup below).

  - name: AmmoCategory
    home_module: player_state
    definition: |
      #[derive(Clone, Copy, Debug, PartialEq, Eq)]
      pub enum AmmoCategory {
          Bullets,
          Shells,
      }
    notes: |
      Discriminator for the per-category ammo pools on Player.
      Knowledge basis: knowledge/combat_balance.md § Ammo Economy —
      "Each weapon definition carries an `ammo_category` field
      (bullets, shells, energy cells, explosive missiles, or a 'no
      ammo' sentinel for melee). The firing pipeline reads this
      field, decrements `player.ammo[category]`, and refuses to
      fire when the pool is empty." This slice (2026-05-18 ammo
      split) ships two of the four reference categories — bullets
      (consumed by the pistol) and shells (deferred shotgun
      consumer, pool exists with no consumer this slice). Energy
      cells and explosive missiles are deferred until the weapons
      that consume them ship (specs/25 § Deferred Combat Features).

      Homed in player_state (NOT level_data) because the pool
      storage lives on Player (mirroring ArmorTier's placement
      logic — "homed in player_state because the type lives on
      Player and mutates via take_damage / take_armor_pickup"
      above). Consumed by:
        - player_state (home): take_ammo_pickup's per-category
          dispatch (Bullets → player.bullets, Shells →
          player.shells; clamps to PLAYER_BULLETS_MAX /
          PLAYER_SHELLS_MAX respectively).
        - weapon_system: the PISTOL_AMMO_CATEGORY constant binds
          the pistol to AmmoCategory::Bullets; fire() reads this
          constant to gate (player.bullets > 0) and decrement
          (player.bullets -= 1). When the shotgun ships, it adds
          SHOTGUN_AMMO_CATEGORY = AmmoCategory::Shells and the
          symmetric gate/decrement on player.shells.
        - game_loop: per-frame pickup-check dispatch — translates
          PickupKind::AmmoBullets / AmmoShells into the matching
          AmmoCategory::Bullets / Shells when calling
          take_ammo_pickup (specs/60 § Bullet/Shell Pickup
          Consumption; frame_update_order below).
        - renderer: draw_hud's topdown ammo pane and
          draw_hud_fps's raycaster ammo pane both dispatch on
          PISTOL_AMMO_CATEGORY to pick which pool to display
          (specs/50 § Ammo Pane, specs/45 § Ammo Pane). With
          pistol as the only weapon the dispatch is constant —
          the dispatch machinery is what the slice ships; the
          one-entry table is what the slice's runtime
          materialises.

      AmmoCategory is a SEPARATE type from PickupKind. The two do
      not unify because PickupKind also covers Health and the two
      Armor tiers (which have no ammo-category meaning), and
      AmmoCategory covers the player-side bullets/shells discriminator
      (which has no health/armor variant). game_loop's pickup-check
      step performs the mapping (AmmoBullets → Bullets, AmmoShells
      → Shells) at the call site.

  - name: ArmorTier
    home_module: player_state
    definition: |
      #[derive(Clone, Copy, Debug, PartialEq, Eq)]
      pub enum ArmorTier {
          None,
          Green,
          Blue,
      }
    notes: |
      Player-side armor tier discriminator. Homed in player_state
      because the type lives on Player and mutates via
      take_damage / take_armor_pickup. Consumed by:
        - player_state (home): take_damage's armor-first routing
          (mid-hit depletion clears to None — specs/25 § Armor
          Damage Routing rule 3), take_armor_pickup overwrites
          to Green or Blue from the matching PickupKind variant.
        - game_loop: per-frame pickup-check dispatch — translates
          PickupKind::ArmorGreen / ArmorBlue into the matching
          ArmorTier::Green / Blue value when calling
          take_armor_pickup (specs/60 § Per-Frame Pickup Check;
          frame_update_order above).
        - renderer: draw_hud's topdown armor pane color dispatch
          (specs/50 § Armor Pane), draw_hud_fps's raycaster
          armor pane color dispatch (specs/45 § Armor Pane).
      Knowledge basis: knowledge/pickups.md § Armor Pickup Tiers
      "armor type values: 0 = none, 1 = small (green), 2 = large
      (blue)". The reference's u8 0/1/2 encoding maps to this enum
      directly; the named variants are preferred over an integer
      cast so pattern matching reads the tier semantics off the
      variant name.

      ArmorTier is a SEPARATE type from PickupKind below. The two
      do not unify because PickupKind also covers Health and Ammo
      while ArmorTier covers the player-state-only None / Green /
      Blue triple including the absent-armor state (which has no
      corresponding pickup). game_loop's pickup-check step performs
      the mapping (ArmorGreen → Green, ArmorBlue → Blue) at the
      call site.

  - name: PickupKind
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug, PartialEq, Eq)]
      pub enum PickupKind {
          Health,
          AmmoBullets,
          AmmoShells,
          ArmorGreen,
          ArmorBlue,
      }
    notes: |
      Discriminator for Pickup. Source: specs/60_pickups.md,
      knowledge/pickups.md, knowledge/combat_balance.md § Ammo
      Economy. Renderer dispatches sprite drawing on this;
      game_loop dispatches pickup application on this.

      ArmorGreen and ArmorBlue variants added in the 2026-05-14
      armor slice. The tier choice is encoded in the variant
      (per knowledge/pickups.md § Armor Pickup Tiers — "Two named
      tiers exist"). game_loop's per-frame pickup check matches
      on PickupKind and forwards the tier to
      player_state::take_armor_pickup(player, ArmorTier::Green |
      ArmorTier::Blue) via the obvious mapping
      (ArmorGreen → Green, ArmorBlue → Blue). The renderer's
      pickup sprite pass dispatches on the same variant to pick
      between PICKUP_ARMOR_GREEN_COLOR and PICKUP_ARMOR_BLUE_COLOR.

      AmmoBullets and AmmoShells: the 2026-05-18 ammo-split slice
      renamed the prior `Ammo` variant to `AmmoBullets` and added
      `AmmoShells` for the deferred shotgun's pool. The category
      choice is encoded in the variant name (per
      knowledge/pickups.md § Ammo Pickup Tiers — "Pickup-to-category
      binding is one-to-one and fixed by pickup kind. Each pickup
      sprite/entity kind hard-codes which ammo category it grants").
      game_loop's per-frame pickup check matches on PickupKind and
      forwards the category to
      player_state::take_ammo_pickup(player, AmmoCategory::Bullets
      | Shells, amount) via the obvious mapping (AmmoBullets →
      Bullets with amount = PICKUP_BULLETS_AMOUNT, AmmoShells →
      Shells with amount = PICKUP_SHELLS_AMOUNT). The renderer's
      pickup sprite pass dispatches on the same variant to pick
      between PICKUP_AMMO_COLOR (bullets, yellow) and
      PICKUP_SHELL_COLOR (shells, warm orange) and between
      PICKUP_AMMO_SIZE_PX and PICKUP_SHELL_SIZE_PX. game_loop's
      enemy-drop scan (specs/60 § Enemy Ammo Drops) pushes
      Pickup { kind: PickupKind::AmmoBullets, ... } because the
      basic trooper drops a bullet clip
      (knowledge/enemy_types.md § Death and Item Drops).

      ArmorTier (the player-side enum) is homed in player_state
      and is a SEPARATE type from PickupKind — see
      ir/contracts/player_state.yaml § ArmorTier. AmmoCategory
      (also player-side, homed in player_state — see § shared
      type above) is ALSO a SEPARATE type from PickupKind. The
      three enums (PickupKind, ArmorTier, AmmoCategory) do not
      unify because PickupKind covers all five pickup variants
      (Health, AmmoBullets, AmmoShells, ArmorGreen, ArmorBlue)
      while ArmorTier covers the player-state-only None/Green/Blue
      triple (no Health, no Ammo categories) and AmmoCategory
      covers the player-state-only Bullets/Shells discriminator
      (no Health, no Armor variants). game_loop's pickup-check
      step performs the mappings (AmmoBullets → AmmoCategory::Bullets,
      AmmoShells → AmmoCategory::Shells; ArmorGreen → ArmorTier::Green,
      ArmorBlue → ArmorTier::Blue) at the call site.

  - name: Pickup
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug)]
      pub struct Pickup {
          pub kind: PickupKind,
          pub pos: Vec2,
          pub active: bool,
      }
    notes: |
      One pickup entity in the level. `active` flips from true to
      false exactly once on consumption (specs/60 § State). Pickups
      are NOT removed from Level::pickups when consumed -- inactive
      pickups are skipped by the renderer and the collision check.
      This deviates from knowledge/pickups.md § Single-use Consumption
      (which removes the entity entirely); we keep the slot for stable
      iteration order in our Vec-based world (specs/60 § Health
      Pickup Consumption rationale). Copy/Clone is fine because
      Pickup is a tiny POD.

  - name: Archetype
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug, PartialEq, Eq)]
      pub enum Archetype {
          BasicTrooper,
          ShotgunTrooper,
      }
    notes: |
      Tag for the enemy variant a Level places at a given spawn.
      Two variants in this slice (specs/25 § Enemy § Per-archetype
      constants); promotes to more variants when additional enemy
      types ship (specs/25 § Deferred Combat Features — Multiple
      enemy types). Lives in level_data (zero-dep module) so the
      EnemySpawn record below can carry it without inverting the
      enemy_logic ↔ level_data dependency graph. Consumed by
      enemy_logic (`Enemy.archetype` field; per-archetype constant
      lookup via the module-private `archetype_stats` helper) and
      by level_generator (each demo level's enemy_spawns vector
      names the variant directly). Coder MAY add `#[repr(u8)]` if
      a const-array lookup shape is picked for `archetype_stats`
      (Coder degree of freedom in enemy_logic.yaml).

  - name: EnemySpawn
    home_module: level_data
    definition: |
      #[derive(Clone, Copy, Debug)]
      pub struct EnemySpawn {
          pub pos: Vec2,
          pub archetype: Archetype,
      }
    notes: |
      One enemy-spawn record in a Level. Replaces the prior plain
      `Vec2` enemy-spawns shape so each spawn carries its archetype.
      Construction: every Level builder (level_data::build_default,
      level_generator::build_local_chase_obstacle,
      level_generator::build_kite_melee,
      level_generator::build_ranged_standoff,
      level_generator::build_shotgun_standoff) populates
      `Level::enemy_spawns: Vec<EnemySpawn>` directly; consumers
      (game_loop::new) iterate the vec and call
      `Enemy::new(s.pos, s.archetype)` per record. Copy/Clone keeps
      the iteration shape ergonomic (no &borrow gymnastics) since
      the struct is two stack values.

  - name: InputState
    home_module: input_controller
    definition: |
      #[derive(Clone, Copy, Debug, Default)]
      pub struct InputState {
          pub forward: f32,   // -1.0 .. 1.0 (W/S)
          pub strafe: f32,    // -1.0 .. 1.0 (A/D)
          pub turn: f32,      // -1.0 .. 1.0 (Left/Right arrow)
          pub fire: bool,     // Space
          pub quit: bool,     // ESC
      }
    notes: |
      InputState is value-typed and trivially Copy so the autopilot bot
      can build one per frame without managing lifetimes. Movement axes
      use float magnitude per specs/21 § Thrust ("proportional to input
      strength"); the keyboard implementation in input_controller emits
      -1.0/0.0/+1.0. The bot in autopilot may emit any value in [-1, 1].


# -----------------------------------------------------------------------------
# main.rs CLI contract (specs/35 § CLI)
# -----------------------------------------------------------------------------
# main.rs is not a "module" in module_plan.yaml -- it's the binary entry point.
# Its content was previously implicit ("just wire it up"); with --autopilot and
# --record-frames it is now contracted explicitly.
main_cli:
  argv_parser:
    notes: |
      Use std::env::args (specs/80). No clap, no argh. Flag states --
      order does not matter, all flags can appear together:
        --autopilot <path>            bot mode; reads scenario YAML at <path>
        --record-frames <path>        raw BGRA dump to <path>
        --render-mode <topdown|raycaster>
                                      pick draw pipeline (specs/45);
                                      default `raycaster` (slice 5
                                      flipped from `topdown`; the
                                      topdown path is permanently
                                      retained as a debug-only
                                      alternate mode for development
                                      use -- specs/00 § Phase 1).
                                      Unknown value (e.g.
                                      `--render-mode foo`) => same
                                      failure mode as missing argument.
      Unknown flag => print usage to stderr, exit code 2.
      Missing argument to a flag => same.

  render_mode:
    notes: |
      Defines `RenderMode` enum (private to main.rs) with variants
      `Topdown` and `Raycaster`. Parsed from --render-mode <value>:
        "topdown"   => RenderMode::Topdown (debug-only alternate mode
                       permanently retained for development use --
                       specs/00 § Phase 1)
        "raycaster" => RenderMode::Raycaster (default if flag absent --
                       flipped from Topdown in slice 5)
        anything else => print usage, exit code 2.
      The selected mode is stored in a local in main() and consulted
      once per frame to dispatch the world-layer draw call. The flag
      is NOT threaded through game_loop::update, autopilot::bot_step,
      input_controller::poll, or any RNG-seeding path -- the simulation
      step is identical between modes; only the rendered pixels differ.
      See specs/45 § Render Mode Selection.

      Per-frame dispatch (regardless of --autopilot / --record-frames):
        match render_mode {
            RenderMode::Topdown   => renderer::draw(&mut framebuffer, &game.level,
                                                    &game.player, &game.enemies,
                                                    &game.fx, game_over),
            RenderMode::Raycaster => {
                raycaster::draw(&mut framebuffer, &game.level,
                                &game.player, &game.enemies, &game.fx);
                // Slice 4: FPS HUD (bottom chrome strip only — no
                // on-view crosshair; the reference draws none, see
                // specs/45 § Reference-Faithful No-Crosshair Choice)
                // replaces the topdown text HUD in raycaster mode.
                // The topdown path's draw_hud is NOT called here; it
                // is reachable only via the Topdown arm's monolithic
                // draw above. specs/45 § HUD Mode Dispatch.
                renderer::draw_hud_fps(&mut framebuffer, &game.player);
                if let Some(won) = game_over {
                    renderer::draw_game_over_border(&mut framebuffer, won);
                }
            }
        }
      The Coder may pick a different code shape for the Raycaster arm
      (one combined helper vs. three explicit calls) so long as the
      visual layer order matches: raycaster fills the framebuffer
      with walls + floor + ceiling + sprites + effects first, then
      FPS HUD (bottom chrome strip only — no on-view crosshair, see
      specs/45 § Reference-Faithful No-Crosshair Choice) on top, then
      game-over border on top of that. See ir/contracts/raycaster.yaml
      and ir/contracts/renderer.yaml for the function signatures involved.

      Slice 2 widens the raycaster::draw signature to accept
      &game.enemies and &game.fx (read-only) so the raycaster can
      project entity billboards (specs/45 § Sprites and Billboards).
      Slice 3 added the first-person effects pass (muzzle flash /
      tracer / wall puff / extra-light bias / damage tint / pickup
      tint) inside raycaster::draw -- no signature change. Slice 4
      swaps the raycaster-arm HUD call from renderer::draw_hud to
      renderer::draw_hud_fps -- a NEW renderer-side public entry
      point that draws the FPS HUD bottom chrome strip only — no
      on-view crosshair is drawn, the reference renders none in its
      first-person view (specs/45 § Reference-Faithful No-Crosshair
      Choice). The raycaster::draw signature is unchanged. The
      topdown arm's renderer::draw signature is also unchanged; the
      slice-4 diff is HUD-call-site only.

  modes:
    interactive:
      trigger: "no flags passed"
      behavior: |
        Existing behavior. minifb window opened, input_controller::poll
        each frame, dt from Instant::now() deltas, RNGs seeded as today.
        No frame_recorder used.
        Level: always level_data::build_default(); the interactive path
        does not parse scenarios so scenario.level is irrelevant here.
            let level = level_data::build_default();
            let mut game = game_loop::new(level);
        Render mode: --render-mode applies orthogonally; default
        Raycaster as of slice 5 (specs/45). --render-mode=topdown is a
        permanently retained debug-only alternate mode for development
        use (specs/00 § Phase 1). All four mode rows below dispatch via
        the render_mode block above; the trigger column lists only the
        autopilot/record axes.
    autopilot_only:
      trigger: "--autopilot <path>"
      behavior: |
        1. yaml = std::fs::read_to_string(path).expect("scenario file readable")
        2. scenario = autopilot::parse_scenario(&yaml)
        3. bot = autopilot::BotState::new()
        4. Pick the level from scenario.level (specs/15):
             let level = match scenario.level {
                 Some(kind) => level_generator::build(kind),
                 None       => level_data::build_default(),
             };
             let mut game = game_loop::new(level);
        5. each frame:
             (input, progress) = autopilot::bot_step(&game, &scenario, &mut bot);
             game_loop::update(&mut game, &input, BOT_FRAME_TIME);  // fixed dt!
             draw(&mut framebuffer, ..., &game, ...);
             window.update_with_buffer(...);
             match progress {
                 BotProgress::Running => continue,
                 BotProgress::AllObjectivesComplete => game.running = false,
                 BotProgress::Failed(msg) => { eprintln!("autopilot failed: {msg}"); game.running = false; }
             }
        6. The window is still opened and updated -- the user sees the bot
           play. ESC still quits (poll the window for the Escape key in
           addition to the bot's input; OR is the running flag).
        7. Determinism: dt is BOT_FRAME_TIME (fixed 1/60), NOT Instant
           deltas. This is the critical difference from interactive mode.
           specs/35 § Determinism.
    record_only:
      trigger: "--record-frames <path>  (without --autopilot)"
      behavior: |
        Interactive play, but every frame after window.update_with_buffer
        also calls frame_recorder::write_frame. dt is Instant-based as in
        interactive mode -- this mode is NOT deterministic; it captures
        whatever the human plays. (Useful for ad-hoc captures, not for
        release demos.)
        Level: same as interactive (level_data::build_default()) — no
        scenario is parsed in this mode.
    autopilot_and_record:
      trigger: "--autopilot <path> --record-frames <out>"
      behavior: |
        Combined: bot drives input, dt fixed at BOT_FRAME_TIME, every frame
        dumped via frame_recorder::write_frame. THIS is the canonical
        release-demo invocation. Two runs produce byte-identical files
        (specs/35 § Acceptance Criteria).
        Level selection follows autopilot_only (specs/15): scenario.level
        Some(kind) => level_generator::build(kind), None => default.
        The PR-preview scenario tests/level/local_chase_obstacle.yaml
        sets level: local_chase_obstacle and is the canonical input here.

  rng_seeding:
    notes: |
      When --autopilot is set, ALL module-private RNGs (weapon_system
      via Player.weapon_rng, enemy_logic, autopilot bot) MUST
      initialize from fixed seeds. Coder degrees of freedom: where the
      seed constants live and the RNG choice (LCG/xorshift). The
      constraint is: same scenario => same byte-for-byte recording.
      specs/35 § Determinism.

      In current code: WEAPON_RNG_SEED, ENEMY_RNG_SEED, and
      BOT_RNG_SEED are passed unconditionally regardless of
      --autopilot — game_loop::new always seeds Player.weapon_rng
      from WEAPON_RNG_SEED, every Enemy embeds ENEMY_RNG_SEED at
      construction (module-private const in `enemy_logic.rs`), and
      BotState::new seeds bot.rng from BOT_RNG_SEED. Specs/35 § Determinism permits a wall-clock seed
      in interactive mode but does not require one; the always-
      fixed-seed shape avoids threading a time source through the
      constructors. The seed arguments on Player::new and (future)
      Enemy::new / BotState::new remain the hooks for a Coder that
      later threads a time source. Either shape (always-fixed or
      mode-switched) satisfies the contract above; the contract is
      the *behavior* (deterministic under --autopilot), not the
      plumbing.

  exit_handling:
    notes: |
      When --record-frames was passed, on loop exit call
      frame_recorder::close(rec) and surface any io::Error to stderr.
      Print one line: "recorded N frames to <path>" using
      rec.frames_written. This makes the recording script's life easier
      (no need to query file size).

# -----------------------------------------------------------------------------
# Per-frame orchestration order
# -----------------------------------------------------------------------------
# game_loop::update(state, input, dt) calls these in this exact sequence.
# Pinned so (a) the Coder for game_loop has a canonical sequence, and
# (b) Coders for each module know who calls them, when, with what borrow.
frame_update_order:
  - "if input.quit { state.running = false; return; }"
  - "state.elapsed += dt  // tick the per-frame clock BEFORE any decision step reads it. Required for the game-over hold-then-exit logic below: `state.elapsed - t0 >= GAME_OVER_HOLD_SEC` only works if elapsed advances each frame. Captured during the 2026-05-14 armor-slice release reconcile after the prior contract omitted this step (the GameState struct doc-comment on `elapsed` mentioned `+= dt in update` but frame_update_order did not list it as a step)."
  - "player_state::apply_input(&mut state.player, input, &state.level, dt)"
  - "// pickup-collision check (specs/60 § Per-Frame Pickup Check, knowledge/pickups.md § Pickup Touch Detection + § Cap Behavior, knowledge/combat_balance.md § Ammo Economy). Iterate state.level.pickups; for the first active pickup with pos.distance_to(state.player.pos) < PICKUP_RADIUS_TILES whose acceptance condition holds — Health: state.player.health < PLAYER_MAX_HEALTH; AmmoBullets: state.player.bullets < PLAYER_BULLETS_MAX; AmmoShells: state.player.shells < PLAYER_SHELLS_MAX; ArmorGreen: state.player.armor < PICKUP_ARMOR_GREEN_TARGET_POINTS; ArmorBlue: state.player.armor < PICKUP_ARMOR_BLUE_TARGET_POINTS — set pickup.active=false, dispatch on pickup.kind to call the matching player_state method (take_health_pickup / take_ammo_pickup(player, AmmoCategory::Bullets, PICKUP_BULLETS_AMOUNT) / take_ammo_pickup(player, AmmoCategory::Shells, PICKUP_SHELLS_AMOUNT) / take_armor_pickup(player, ArmorTier::Green) / take_armor_pickup(player, ArmorTier::Blue)), and call visual_effects::increment_pickup_tint(&mut state.fx) (specs/40 § Pickup Tint Screen Flash). All five pickup kinds use the SAME pickup tint — knowledge/pickups.md § Single-use Consumption confirms every pickup contributes the same flash amount. The two AmmoCategory arms preserve pool independence: AmmoBullets writes only player.bullets, AmmoShells writes only player.shells (knowledge/combat_balance.md § Ammo Economy — 'picking up shells never changes the bullets count, and vice versa')."
  - "for enemy in &mut state.enemies: enemy_logic::update(enemy, &mut state.player, &state.level, &mut state.fx, dt)  // enemy.archetype is consulted internally via archetype_stats() for max_health / pain_chance / pellet_count / attack_sequence_sec"
  - "if input.fire && state.player.alive: weapon_system::fire(&mut state.player, &mut state.enemies, &state.level, &mut state.fx) -- the per-shot cooldown gate is INSIDE fire(), keyed off player.time_since_fire. Ammo gate is also inside fire(): for the pistol (PISTOL_AMMO_CATEGORY = AmmoCategory::Bullets), if player.bullets == 0, fire() returns without side effects after the cooldown gate. After all fire-side effects complete, fire() decrements the equipped weapon's pool (player.bullets -= 1 for the pistol; knowledge/combat_balance.md § Ammo Economy 'Pistol: 1 bullet per shot')."
  - "// specs/25 § Enemy drop on death + specs/60 § Enemy Ammo Drops: scan state.enemies AFTER the enemy update loop AND after weapon_system::fire (so a same-frame kill drops the pickup that frame, not next frame). For each enemy where !enemy.alive AND !enemy.ammo_drop_spawned, push Pickup { kind: PickupKind::AmmoBullets, pos: enemy.pos, active: true } onto state.level.pickups and set enemy.ammo_drop_spawned = true. The variant is AmmoBullets (was `Ammo` pre-2026-05-18 ammo-split slice) because the basic trooper drops a bullet clip — knowledge/enemy_types.md § Death and Item Drops 'The basic hitscan trooper drops a clip (bullet ammo) on death'. Coder may use a two-pass shape (collect dropped positions, then push) to side-step split-borrow ergonomics; both shapes meet the contract. The behavior is `exactly one Pickup pushed per dead trooper, at the trooper's death position, in the same frame death is detected`. Re-running this scan on subsequent frames is a no-op because ammo_drop_spawned remains true. The drop is collectible by the existing per-frame pickup check on the next frame (the pickup check ran earlier this frame, before enemy update + weapon_system::fire, so the new Pickup is not seen until the next frame's pickup-check step)."
  - "player_state::decay_damage_tint(&mut state.player, dt)"
  - "visual_effects::tick(&mut state.fx, dt)"
  - "// specs/20 § Game Over Flow: the game-over DECISION (player alive becomes false; or pos.distance_to(level.exit) < EXIT_RADIUS) and the loop-EXIT ACTION (running = false) MUST be in separate iterations of the main loop. Implementation pattern: the decision sets `state.game_over_at = Some(elapsed_seconds)`. The exit action runs only when `now - game_over_at >= GAME_OVER_HOLD_SEC` from specs/25 § Visual. Until then, the loop continues to call update + draw with `game_over` set so the colored border keeps rendering. Without this separation, the implementation flips running=false on the same tick the win/lose state is detected and the colored border renders for zero frames."
  - "if !state.player.alive && state.game_over_at.is_none(): state.game_over_at = Some(state.elapsed)  // game over (lose) — DECISION ONLY; loop continues to draw. The is_none() guard is REQUIRED: without it the timestamp re-flips every frame, `state.elapsed - t0` stays at dt, and the hold-then-exit logic below never fires (the loop would never exit on player death). Captured during the 2026-05-14 armor-slice release reconcile; the prior contract omitted the guard."
  - "if state.player.pos.distance_to(state.level.exit) < EXIT_RADIUS && state.game_over_at.is_none(): state.won = true; state.game_over_at = Some(state.elapsed)  // game over (win) — DECISION ONLY. is_none() guard same rationale as the lose arm; also ensures that a player who dies AT the exit is registered as a loss (lose arm runs first, sets game_over_at, and this arm's is_none() check then fails) rather than a simultaneous win/lose."
  - "if let Some(t0) = state.game_over_at: if state.elapsed - t0 >= GAME_OVER_HOLD_SEC: state.running = false  // exit ACTION after hold elapsed"
  - "#[cfg(test)] state.frames += 1"

# -----------------------------------------------------------------------------
# Service-emit policy (spec/80 § API Surface)
# -----------------------------------------------------------------------------
# Per call-site decision: A = method takes &mut <Service> directly because it
# is itself a per-frame orchestration hook; B = method returns a description
# and game_loop emits.
service_emit_decisions:
  - call_site: "weapon_system::fire"
    resolution: A
    rationale: |
      fire() is invoked from game_loop::update once per frame as the
      combat tick. Spec/80 § API Surface explicitly carves out
      `update`-style methods that take the full per-frame borrow graph.

  - call_site: "enemy_logic::update"
    resolution: A
    rationale: |
      Per-frame AI hook. Spec/40 § Implementation note line 100 even
      pins the signature: "the corpse marker is spawned by
      enemy.update()" -- exactly so update() owns the &mut VisualEffects
      borrow rather than take_damage() pulling it transitively.
      The Attack-state hitscan added in the 2026-05-13 combat slice
      reuses the same borrow chain: enemy_logic::update already takes
      &mut Player and uses player_state::take_damage as the call site
      for hitscan-on-player damage application, and &mut VisualEffects
      (for blood splat at the player on hit, wall puff on miss-into-
      wall). No new borrow is introduced — only a new consumer of the
      existing borrows. Resolution stays A.

  - call_site: "game_loop drop-spawn scan (specs/60 § Enemy Ammo Drops)"
    resolution: B
    rationale: |
      The ammo-drop spawn is NOT enemy_logic's responsibility because
      enemy_logic::update has only &Level, not &mut Level::pickups —
      pushing a Pickup requires the &mut Vec<Pickup> borrow. Rather
      than widening update()'s borrow graph (which would force
      weapon_system::fire's &Level to also become &mut Level on the
      take_damage transitive path), game_loop hosts a small scan
      after the enemy update + weapon fire steps in
      frame_update_order. enemy_logic::take_damage flips
      Enemy.ammo_drop_spawned = false (the field is initialized
      false and stays false through state transitions); game_loop's
      scan reads !enemy.alive AND !enemy.ammo_drop_spawned to decide
      whether to push, then flips to true. This is the canonical
      Resolution-B shape: the per-frame hook returns data
      (Enemy.ammo_drop_spawned still false after death) that the
      orchestration layer (game_loop) reads and acts on.

  - call_site: "enemy_logic::take_damage"
    resolution: A
    rationale: |
      take_damage is called from inside weapon_system::fire (which is
      itself a per-frame hook). The &mut VisualEffects parameter is
      simply forwarded along the existing combat-tick borrow chain --
      no new "service borrow" introduced. Spawning the death-fade
      effect synchronously avoids losing it if the Enemy is deallocated
      before the next update tick (which can't happen today but is a
      cheap correctness margin).

  - call_site: "player_state::take_damage"
    resolution: B
    rationale: |
      take_damage is NOT a per-frame hook. The damage tint is derived
      in renderer from player.damage_count (which take_damage updates
      directly on Player). No &mut VisualEffects parameter is needed
      because the tint is an overlay, not a spawned effect. Keeps
      player_state independent of visual_effects symbol-wise EXCEPT for
      the two constants DAMAGE_TINT_CAP and DAMAGE_TINT_DECAY_PER_SEC
      (constant import is fine; struct import is not).

      The 2026-05-14 armor slice extends take_damage to apply the
      armor-first routing rule (specs/25 § Armor Damage Routing). The
      resolution is unchanged — take_damage still mutates only the
      player struct (armor / armor_type / health / damage_count /
      alive), and the residual damage that reaches health is what
      feeds damage_count for the tint. No &mut VisualEffects is
      introduced.

  - call_site: "player_state::take_armor_pickup"
    resolution: B
    rationale: |
      Same shape as take_health_pickup / take_ammo_pickup — the
      method is called from inside game_loop's per-frame pickup-check
      step (frame_update_order above), which itself is an
      orchestration hook. take_armor_pickup mutates only the player
      struct (armor + armor_type overwrite to the tier's target
      pool). The pickup-tint flash is emitted by game_loop's
      pickup-check step via visual_effects::increment_pickup_tint,
      not from inside take_armor_pickup — preserving the spec/80
      § API Surface "non-orchestration methods do not take service
      borrows" rule.

  - call_site: "renderer::draw"
    resolution: B
    rationale: |
      Render is read-only. It reads VisualEffects and player.damage_count
      and emits pixels into the framebuffer. No spawn API needed.

# -----------------------------------------------------------------------------
# Coder degrees of freedom (intentionally unpinned)
# -----------------------------------------------------------------------------
coder_degrees_of_freedom:
  - "Internal helper functions inside any module (private fn body)."
  - "Choice of small RNG implementation (simple LCG vs. xorshift) for damage rolls and pain checks; module-private."
  - "Whether weapon_system and enemy_logic share an RNG seed via a small private helper module or each carry their own."
  - "Internal struct ordering / field layout details that do not change the public API."
  - "Bot pathfinding internals in autopilot (turn-toward, stuck-detect, strafe heuristic). The public Scenario / Objective shape is pinned; the bot logic is not."
  - "Bot pickup-seeking helper shape in autopilot — single fn returning Option<(usize, Vec2)> vs. separate health/ammo selectors vs. inlined logic in bot_step. Whichever shape is picked, it MUST stay module-private (specs/80 § API Surface). The behavior is pinned in specs/30 § Pickup-Seeking; the helper shape is not."
  - "Whether the ammo-opportunism two-segment path is computed as one concatenated BFS or as two replans (player→pickup, then pickup→target after consumption). Both meet the spec; option (b) reuses single-target BFS without modification."
  - "Choice of slide algorithm in player_state and enemy_logic (axis-aligned per spec/21; the per-axis order and the integer-vs-float of the radius check are Coder-internal)."
  - "Whether VisualEffect lifetime decay uses retain() or a manual swap_remove loop -- both meet the spec."
  - "Enemy LoS helper for the Attack-state gate (`enemy_has_los(from, to, level) -> bool`) shape. Coder may keep it module-private to enemy_logic, or extract a shared `level_data::has_los` helper that both enemy_logic and autopilot's `has_line_of_sight` import. Either shape meets the contract; the tile-grid ray-cast at TRACE_STEP samples (or the closed-form 2D DDA equivalent) is what is pinned in spec, not the function's home."
  - "Whether the trooper's hitscan ray-march reuses TRACE_STEP imported from weapon_system or duplicates the 0.1-tile literal. Both are acceptable; weapon_system's TRACE_STEP is already public for the player-fire path, so importing it does NOT widen weapon_system's API surface."
  - "Game_loop's drop-spawn scan implementation shape (single iter_mut + push, two-pass collect-then-push to avoid split-borrow ergonomics, drain_filter pattern, etc.). The contract pins the behavior (one Pickup pushed per dead trooper at the death position, gated by ammo_drop_spawned) and not the loop shape."

# -----------------------------------------------------------------------------
# Things intentionally NOT pinned (and flagged so Reconciler doesn't double-look)
# -----------------------------------------------------------------------------
intentionally_unspecified:
  - "Renderer color values are listed in `renderer.public_constants` (the renderer is their single consumer). Specs/25 § Visual is the source; do NOT duplicate the same constants in any other module's contract."
  - "Specific stuck-detection strafe heuristic in autopilot: spec/30 § Stuck Detection only specifies the trigger frames (30/60), not the strafe direction selection algorithm."
  - "console-message fate from the prior generation (specs/20 line 67 calls these `Hit for X! ...` lines a separate Coder decision). Coders MAY emit them, MAY suppress them. Reconciler will capture whichever choice is made."

# -----------------------------------------------------------------------------
# Conflicts between spec sources (resolved here so Coders never have to)
# -----------------------------------------------------------------------------
spec_conflicts_resolved:
  - issue: |
      ir/game_ir.yaml lists enemy attack_damage_values as [3, 6, 9, 12, 15]
      AND specs/25 § Enemy says "Attack damage 3, 6, 9, 12, or 15 per hit"
      with formula "(random(0..4) + 1) * 3". Both agree. No conflict.
    resolution: "Use the explicit array [3, 6, 9, 12, 15]."
  - issue: |
      Pistol damage: ir/game_ir.yaml says [5, 10, 15] mean 10. Specs/25
      § Weapon agrees ("5, 10, or 15 per shot, formula 5 * (random(0..2) + 1)").
      No conflict.
    resolution: "Use formula 5 * (random(0..3) + 1) -> {5, 10, 15}."
  - issue: |
      ir/simplifications.yaml describes simplifications ("enemy_detection_is_immediate
      _no_los", "weapon_spread_approximated_not_triangular"). Spec/25
      describes the implemented (simplified) constants AND the target
      (deferred) constants. Spec/25 takes precedence per CLAUDE.md
      "Specs are the source of truth".
    resolution: |
      Coders implement the "Implemented" rows of specs/25 only.
      Triangular spread IS implemented (rand-rand) per the contract
      for weapon_system::fire and enemy_logic::update Attack arm.
      The 2026-05-13 combat slice promoted the trooper's ranged
      hitscan, line-of-sight detection, Attack state, and ammo-clip
      drop from the prior `### Target` table to `### Implemented` —
      the table itself was retired and replaced by `### Deferred from
      knowledge` (specs/25 § Enemy), which lists only the rows the
      prototype intentionally does NOT ship (distance probability
      check, no-double-attack direction switch, 8-directional grid
      pathing, idle-scan animation, target threshold, sound
      propagation, gib threshold, half-clip "dropped" flag, etc.).
      ir/game_ir.yaml's `simplifications` block was refreshed in the
      same combat-slice commit: the prior three entries
      (`enemy_attack_is_contact_not_hitscan`,
      `enemy_ai_simplified_no_attack_state`,
      `enemy_detection_is_immediate_no_los`) are removed (kept as
      `# Removed:` comments for traceability) and replaced by the
      four narrower deferred entries that match
      specs/25 § Enemy § Deferred from knowledge
      (`enemy_ranged_fire_no_distance_probability_check`,
      `enemy_no_double_attack_direction_switch_omitted`,
      `enemy_movement_smooth_slide_not_8_directional_grid`,
      `enemy_drop_full_amount_no_dropped_flag`). Specs precedence
      still applies — the IR file's `simplifications` list is now a
      consistent shorthand of spec/25's deferred-from-knowledge
      table, not an alternative source.
