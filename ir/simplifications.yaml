# Target-vs-as-is deltas: prototype shortcuts taken relative to the
# target shape described in `ir/game_ir.yaml` and `knowledge/`.
#
# Each entry is a stable identifier-style token naming one simplification
# the current generated game makes against the reference / target. The
# list is narrative — agents and humans read it; no code generator
# consumes it programmatically (greps in `tooling/` confirm: only prose
# references in `tooling/agents/coder.md` and `ir/contracts/_shared.yaml`).
#
# Lifecycle:
#   - Architect adds an entry when documenting a NEW deferral against
#     the target.
#   - Architect removes an entry (replacing it with a `# Removed: ...`
#     comment line that names the slice/PR that closed the gap) when
#     the as-is state catches up to the target.
#   - Reconciler may flip an entry to a `# Removed:` comment as part
#     of its drift-capture pass.
#
# This file lives outside `ir/game_ir.yaml` deliberately. `game_ir.yaml`
# is in `tooling/orchestrator_run.py § FROZEN_CONTEXT_FILES` — every
# Coder/Reconciler invocation inlines it verbatim into the prompt
# cache key, so a one-line edit invalidates the cache for ALL 14
# modules. The simplifications list is bookkeeping prose that the
# Coder does not consume; pinning it to the cache key forces partial-
# scope PRs (where a slice touches only 1-2 modules) into full 14-
# module regens. Splitting it out keeps Architect's bookkeeping cheap
# without losing the historical record.
#
# `partial_regen.py § global` triggers and `FROZEN_CONTEXT_FILES`
# must NOT list this file — that's the whole point. The
# pre-Architect read path is unchanged: `tooling/generate_module.py`
# still inlines `ir/game_ir.yaml` for full-module generation context,
# and Architect/Coder Read this file via tool call when they need
# the current deferral list.

