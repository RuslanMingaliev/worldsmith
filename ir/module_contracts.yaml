  # ---------------------------------------------------------------------------
  - name: renderer
    file: src/renderer.rs
    depends_on: [presentation, visual_effects]
    public_types: []
    public_constants:
      # RGB packed 0xRRGGBB; the renderer is the only consumer of these.
      - { name: COLOR_WALL,                type: u32, value: "0x404040", source: "specs/25 § Visual" }
      - { name: COLOR_FLOOR,               type: u32, value: "0x808080", source: "specs/25 § Visual" }
      - { name: COLOR_PLAYER,              type: u32, value: "0x00FF00", source: "specs/25 § Visual" }
      - { name: COLOR_ENEMY,               type: u32, value: "0xFF0000", source: "specs/25 § Visual" }
      - { name: COLOR_EXIT,                type: u32, value: "0x00FFFF", source: "specs/25 § Visual" }
      - { name: COLOR_DIRECTION_LINE,      type: u32, value: "0xFFFF00", source: "specs/25 § Visual" }
      - { name: COLOR_MUZZLE_FLASH,        type: u32, value: "0xFFFF80", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_TRACER,              type: u32, value: "0xFFFFC0", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_PUFF,                type: u32, value: "0xB0B0B0", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_BLOOD,               type: u32, value: "0xC00000", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_PAIN_FLASH,          type: u32, value: "0xFFFFFF", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_CORPSE,              type: u32, value: "0x602020", source: "specs/25 § Visual Feedback" }
      - { name: COLOR_DAMAGE_TINT,         type: u32, value: "0xFF0000", source: "specs/25 § Visual Feedback" }
      - { name: PLAYER_RADIUS_PX,          type: i32, value: "14",  source: "specs/25 § Visual" }
      - { name: ENEMY_RADIUS_PX,           type: i32, value: "12",  source: "specs/25 § Visual" }
      - { name: EXIT_MARKER_SIZE_PX,       type: i32, value: "20",  source: "specs/25 § Visual" }
      - { name: DIRECTION_LINE_LEN_PX,     type: i32, value: "20",  source: "specs/25 § Visual" }
      - { name: GAME_OVER_BORDER_PX,       type: i32, value: "10",  source: "specs/25 § Visual" }
      - { name: DAMAGE_TINT_MAX_ALPHA_PCT, type: u32, value: "50",  source: "specs/25 § Visual Feedback (~50%)" }
    public_methods:
      - signature: |
          pub fn draw(
              framebuffer: &mut Vec<u32>,
              level: &Level,
              player: &Player,
              enemies: &[Enemy],
              fx: &VisualEffects,
              game_over: Option<bool>,  // None = playing, Some(true) = won, Some(false) = lost
          )
        notes: |
          Single render entry point invoked once per frame by game_loop.
          Layer order (back to front, per spec/40 § Effect Layering):
            1. Floor + walls (level tiles).
            2. Exit marker (cyan X) and corpses.
            3. Blood splats and wall puffs.
            4. Tracer lines.
            5. Muzzle flashes.
            6. Live enemies (pain-flashed body color when
               enemy.pain_flash_remaining > 0, else COLOR_ENEMY).
            7. Player disc + direction line.
            8. Player damage tint overlay if level > 0:
                 level = ((player.damage_count * DAMAGE_TINT_LEVELS as f32)
                          / DAMAGE_TINT_CAP).ceil() as u32;
                 level = level.min(DAMAGE_TINT_LEVELS);
                 alpha_pct = (DAMAGE_TINT_MAX_ALPHA_PCT * level)
                              / DAMAGE_TINT_LEVELS;
                 software-blend COLOR_DAMAGE_TINT into framebuffer at
                 alpha_pct.
            9. Game-over border if game_over.is_some()
               (green tint for win, red for lose; thickness
               GAME_OVER_BORDER_PX).
          The renderer reads visual_effects, player.damage_count,
          enemy.pain_flash_remaining, enemy.death_fade_remaining (for
          fade interpolation), and enemy.alive (corpse vs. live). It
          does NOT mutate any other module's state.
      - signature: "pub fn make_framebuffer() -> Vec<u32>"
        notes: |
          Allocates Vec::from_iter([0u32; WINDOW_WIDTH * WINDOW_HEIGHT]).
          Helper so main.rs doesn't need to import WINDOW_WIDTH etc.
          itself.
    cross_module_borrows:
      - "&mut Vec<u32> (the framebuffer is owned by main.rs/game_loop)"
      - "&Level, &Player, &[Enemy], &VisualEffects (all read-only)"
    notes: |
      Renderer owns the COLOR_* table to keep specs/25 § Visual values
      from being duplicated (per intentionally_unspecified note below).
      All RGB constants are declared local because the renderer is the
      single consumer.

  # ---------------------------------------------------------------------------
  - name: game_loop
    file: src/game_loop.rs
    depends_on:
      - level_data
      - player_state
      - enemy_logic
      - weapon_system
      - input_controller
      - visual_effects
    public_types:
      - name: GameState
        definition: |
          pub struct GameState {
              pub level: Level,
              pub player: Player,
              pub enemies: Vec<Enemy>,
              pub fx: VisualEffects,
              pub running: bool,           // false -> main loop exits
              pub won: bool,               // true once player reaches exit
              #[cfg(test)]
              pub frames: u64,             // tick counter; only autopilot reads this
          }
    public_constants: []
    public_methods:
      - signature: "pub fn new() -> GameState"
        notes: |
          Constructs GameState from Level::build_default():
            level = level_data::build_default()
            player = Player::new(level.player_spawn)
            enemies = level.enemy_spawns.iter()
                          .map(|&s| Enemy::new(s)).collect()
            fx = VisualEffects::new()
            running = true; won = false; (#[cfg(test)] frames = 0)
      - signature: "pub fn update(state: &mut GameState, input: &InputState, dt: f32)"
        notes: |
          ONE per-frame tick. Order is pinned by frame_update_order
          below. Both main.rs and autopilot call update(...). Caller
          (main.rs) handles minifb redraw and per-frame timing; caller
          (autopilot) drives a fixed dt = 1.0/60.0.
    cross_module_borrows:
      - "Owns Level, Player, Enemies, VisualEffects -- all by value."
      - "Borrows &InputState for the duration of update()."
    notes: |
      The `frames` field is `#[cfg(test)]` because the only consumer is
      autopilot's `game.frames` assertion (specs/30). Per spec/80 §
      API Surface "no dead pub exports", a release-build symbol with
      no consumer must not be public.

  # ---------------------------------------------------------------------------
  - name: autopilot
    file: src/autopilot.rs
    cfg_test_only_module: true
    depends_on:
      - game_loop
      - input_controller
      - level_data
      - player_state
      - enemy_logic
    public_types:
      - name: Scenario
        definition: |
          #[derive(Debug, serde::Deserialize)]
          pub struct Scenario {
              pub scenario: String,
              pub description: String,
              pub objectives: Vec<Objective>,
              pub assertions: Vec<Assertion>,
          }
        cfg_test_only: true
      - name: Objective
        definition: |
          #[derive(Debug, serde::Deserialize)]
          #[serde(rename_all = "lowercase")]
          pub enum Objective {
              Kill { kill: String },
              Reach { reach: String },
              Approach { approach: String },
              Wait { wait: u32 },
          }
        cfg_test_only: true
        notes: |
          Implementation choice deferred to Coder: the YAML files in
          tests/ use a single-key-mapping form
          ("- kill: enemy"); the Coder may use serde_yaml::Value
          inspection or a custom Deserialize impl. The public *shape*
          (kill/reach/approach/wait) is what must be stable.
      - name: Assertion
        definition: |
          #[derive(Debug)]
          pub struct Assertion {
              pub field: String,    // "player.alive", "game.won", ...
              pub op: AssertOp,     // Eq | Gt | Lt | Gte | Lte
              pub value: AssertValue,
          }
        cfg_test_only: true
      - name: AssertOp
        definition: |
          #[derive(Debug, Clone, Copy, PartialEq)]
          pub enum AssertOp { Eq, Gt, Lt, Gte, Lte }
        cfg_test_only: true
      - name: AssertValue
        definition: |
          #[derive(Debug)]
          pub enum AssertValue { Bool(bool), Number(f32) }
        cfg_test_only: true
    public_constants:
      - { name: BOT_FRAME_RATE,         type: f32, value: "60.0",   source: "specs/30 § Execution Rules", cfg_test_only: true }
      - { name: BOT_FRAME_TIME,         type: f32, value: "0.01666667", source: "specs/30 § Execution Rules (1/60)", cfg_test_only: true }
      - { name: BOT_MAX_FRAMES,         type: u32, value: "3600",   source: "specs/30 § Execution Rules (60 sec)", cfg_test_only: true }
      - { name: BOT_REACH_DISTANCE,     type: f32, value: "1.0",    source: "specs/30 § Objectives (reach)", cfg_test_only: true }
      - { name: BOT_APPROACH_DISTANCE,  type: f32, value: "8.0",    source: "specs/30 § Objectives (approach)", cfg_test_only: true }
      - { name: BOT_STUCK_FRAMES,       type: u32, value: "30",     source: "specs/30 § Stuck Detection", cfg_test_only: true }
      - { name: BOT_REVERSE_STRAFE_FRAMES, type: u32, value: "60",  source: "specs/30 § Stuck Detection", cfg_test_only: true }
      - { name: BOT_ALIGNMENT_RAD,      type: f32, value: "0.2",    source: "Coder generation default -- 'roughly facing' threshold; Reconciler should capture if not in spec/25", cfg_test_only: true }
    public_methods:
      - signature: "pub fn parse_scenario(yaml: &str) -> Scenario"
        notes: "serde_yaml::from_str(yaml).expect('valid scenario YAML')."
        cfg_test_only: true
      - signature: "pub fn run_scenario(scenario: &Scenario) -> ScenarioResult"
        notes: |
          1. state = GameState::new();
          2. for frame in 0..BOT_MAX_FRAMES:
               input = bot_step(&state, &scenario.objectives, ...);
               game_loop::update(&mut state, &input, BOT_FRAME_TIME);
               if all objectives complete or !state.running: break;
          3. for assertion in &scenario.assertions:
               check_assertion(&state, assertion);
          4. return ScenarioResult { passed, failures }.
        cfg_test_only: true
      - signature: "pub struct ScenarioResult { pub passed: bool, pub failures: Vec<String> }"
        cfg_test_only: true
      - signature: |
          #[test]
          fn run_all_scenarios()
        notes: |
          Iterates `tests/**/*.yaml`, parses each scenario, runs it,
          asserts ScenarioResult.passed == true, panics with the first
          failure message otherwise. This is the entry point cargo test
          discovers.
        cfg_test_only: true
    cross_module_borrows:
      - "&mut GameState (drives update each frame)"
      - "Constructs InputState by value each frame"
    notes: |
      ENTIRE module is `#[cfg(test)]`-gated by main.rs (`#[cfg(test)] mod
      autopilot;`). The Coder for autopilot does NOT need to add
      individual `#[cfg(test)]` attributes inside the module -- the
      module gate already excludes everything from release builds.
      `cfg_test_only: true` on each public_constants entry above is a
      DOCUMENTATION marker for Reconciler diffing, not a Rust attribute
      to add inside the file.

# -----------------------------------------------------------------------------
# Per-frame orchestration order
# -----------------------------------------------------------------------------
# game_loop::update(state, input, dt) calls these in this exact sequence.
# Pinned so (a) the Coder for game_loop has a canonical sequence, and
# (b) Coders for each module know who calls them, when, with what borrow.
frame_update_order:
  - "if input.quit { state.running = false; return; }"
  - "player_state::apply_input(&mut state.player, input, &state.level, dt)"
  - "for enemy in &mut state.enemies: enemy_logic::update(enemy, &mut state.player, &state.level, &mut state.fx, dt)"
  - "if input.fire && state.player.alive: weapon_system::fire(&mut state.player, &mut state.enemies, &state.level, &mut state.fx) -- the per-shot cooldown gate is INSIDE fire(), keyed off player.time_since_fire"
  - "player_state::decay_damage_tint(&mut state.player, dt)"
  - "visual_effects::tick(&mut state.fx, dt)"
  - "if !state.player.alive: state.running = false  // game over (lose)"
  - "if state.player.pos.distance_to(state.level.exit) < EXIT_RADIUS: state.won = true; state.running = false  // game over (win)"
  - "#[cfg(test)] state.frames += 1"

# -----------------------------------------------------------------------------
# Service-emit policy (spec/80 § API Surface)
# -----------------------------------------------------------------------------
# Per call-site decision: A = method takes &mut <Service> directly because it
# is itself a per-frame orchestration hook; B = method returns a description
# and game_loop emits.
service_emit_decisions:
  - call_site: "weapon_system::fire"
    resolution: A
    rationale: |
      fire() is invoked from game_loop::update once per frame as the
      combat tick. Spec/80 § API Surface explicitly carves out
      `update`-style methods that take the full per-frame borrow graph.

  - call_site: "enemy_logic::update"
    resolution: A
    rationale: |
      Per-frame AI hook. Spec/40 § Implementation note line 100 even
      pins the signature: "the corpse marker is spawned by
      enemy.update()" -- exactly so update() owns the &mut VisualEffects
      borrow rather than take_damage() pulling it transitively.

  - call_site: "enemy_logic::take_damage"
    resolution: A
    rationale: |
      take_damage is called from inside weapon_system::fire (which is
      itself a per-frame hook). The &mut VisualEffects parameter is
      simply forwarded along the existing combat-tick borrow chain --
      no new "service borrow" introduced. Spawning the death-fade
      effect synchronously avoids losing it if the Enemy is deallocated
      before the next update tick (which can't happen today but is a
      cheap correctness margin).

  - call_site: "player_state::take_damage"
    resolution: B
    rationale: |
      take_damage is NOT a per-frame hook. The damage tint is derived
      in renderer from player.damage_count (which take_damage updates
      directly on Player). No &mut VisualEffects parameter is needed
      because the tint is an overlay, not a spawned effect. Keeps
      player_state independent of visual_effects symbol-wise EXCEPT for
      the two constants DAMAGE_TINT_CAP and DAMAGE_TINT_DECAY_PER_SEC
      (constant import is fine; struct import is not).

  - call_site: "renderer::draw"
    resolution: B
    rationale: |
      Render is read-only. It reads VisualEffects and player.damage_count
      and emits pixels into the framebuffer. No spawn API needed.

# -----------------------------------------------------------------------------
# Coder degrees of freedom (intentionally unpinned)
# -----------------------------------------------------------------------------
coder_degrees_of_freedom:
  - "Internal helper functions inside any module (private fn body)."
  - "Choice of small RNG implementation (simple LCG vs. xorshift) for damage rolls and pain checks; module-private."
  - "Whether weapon_system and enemy_logic share an RNG seed via a small private helper module or each carry their own."
  - "Internal struct ordering / field layout details that do not change the public API."
  - "Bot pathfinding internals in autopilot (turn-toward, stuck-detect, strafe heuristic). The public Scenario / Objective shape is pinned; the bot logic is not."
  - "Choice of slide algorithm in player_state and enemy_logic (axis-aligned per spec/21; the per-axis order and the integer-vs-float of the radius check are Coder-internal)."
  - "Whether VisualEffect lifetime decay uses retain() or a manual swap_remove loop -- both meet the spec."

# -----------------------------------------------------------------------------
# Things intentionally NOT pinned (and flagged so Reconciler doesn't double-look)
# -----------------------------------------------------------------------------
intentionally_unspecified:
  - "Renderer color values are listed in `renderer.public_constants` (the renderer is their single consumer). Specs/25 § Visual is the source; do NOT duplicate the same constants in any other module's contract."
  - "Specific stuck-detection strafe heuristic in autopilot: spec/30 § Stuck Detection only specifies the trigger frames (30/60), not the strafe direction selection algorithm."
  - "console-message fate from the prior generation (specs/20 line 67 calls these `Hit for X! ...` lines a separate Coder decision). Coders MAY emit them, MAY suppress them. Reconciler will capture whichever choice is made."

# -----------------------------------------------------------------------------
# Conflicts between spec sources (resolved here so Coders never have to)
# -----------------------------------------------------------------------------
spec_conflicts_resolved:
  - issue: |
      ir/game_ir.yaml lists enemy attack_damage_values as [3, 6, 9, 12, 15]
      AND specs/25 § Enemy says "Attack damage 3, 6, 9, 12, or 15 per hit"
      with formula "(random(0..4) + 1) * 3". Both agree. No conflict.
    resolution: "Use the explicit array [3, 6, 9, 12, 15]."
  - issue: |
      Pistol damage: ir/game_ir.yaml says [5, 10, 15] mean 10. Specs/25
      § Weapon agrees ("5, 10, or 15 per shot, formula 5 * (random(0..2) + 1)").
      No conflict.
    resolution: "Use formula 5 * (random(0..3) + 1) -> {5, 10, 15}."
  - issue: |
      ir/game_ir.yaml describes simplifications ("enemy_detection_is_immediate
      _no_los", "weapon_spread_approximated_not_triangular"). Spec/25
      describes the implemented (simplified) constants AND the target
      (deferred) constants. Spec/25 takes precedence per CLAUDE.md
      "Specs are the source of truth".
    resolution: |
      Coders implement the "Implemented" rows of specs/25 only. The
      "Target (from knowledge, not yet implemented)" rows are carried
      in spec/25 explicitly so they remain Reconciler-visible without
      being implemented this run. Triangular spread IS implemented
      (rand-rand) per the contract for weapon_system::fire above --
      this is a partial uplift from the pre-existing approximation
      and is consistent with specs/25 first-shot accuracy semantics.
