game_family: retro_shooter
version: "2026.1"
goal: minimal_playable_vertical_slice

player:
  movement: first_person
  collision: walls_only

combat:
  weapon_count: 1
  attack_type: hitscan
  weapon:
    name: pistol
    damage_values: [5, 10, 15]
    damage_mean: 10
    fire_cycle_seconds: 0.54
    range_map_units: 2048
    first_shot_accurate: true
    refire_spread_degrees: 5.6
    spread_distribution: triangular
  pain_system:
    enabled: true
    check_per_hit: true

enemy:
  archetypes:
    - type: basic_ranged
      name: basic_trooper
      health: 20
      speed_units_per_sec: 2.0
      detection: line_of_sight
      reaction_delay_seconds: 0.23
      attack_type: hitscan
      attack_damage_values: [3, 6, 9, 12, 15]
      attack_damage_mean: 9
      attack_spread_degrees: 22.0
      attack_range_map_units: 2048
      fire_cycle_seconds: 0.54
      attack_sequence_seconds: 0.74
      pain_chance_pct: 78
      pain_duration_seconds: 0.17
      radius_map_units: 20
      height_map_units: 56
      mass: 100
      idle_scan_seconds: 0.57
      chase_cycle_seconds: 0.91
      target_threshold_seconds: 2.86
      gib_threshold_hp: -20
      drop_item: ammo_clip
      movement_directions: 8
      ai_states: [idle, chase, attack, pain, death]

level:
  count: 1
  type: static
  exit_required: true

rendering:
  complexity: minimal

simplifications:
  - enemy_attack_is_contact_not_hitscan
  - enemy_ai_simplified_no_attack_state
  - enemy_detection_is_immediate_no_los
  - weapon_spread_approximated_not_triangular
  - player_movement_direct_not_momentum

generation:
  mode: incremental_preferred
