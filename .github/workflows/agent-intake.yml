name: Agent Intake (issue → Extractor + Architect → PR)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-intake-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  run:
    if: github.event.label.name == 'agent:run'
    name: agent-intake
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      WORLDSMITH_MAX_TOKENS_PER_RUN: ${{ vars.WORLDSMITH_MAX_TOKENS_PER_RUN }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ACTOR: ${{ github.event.sender.login }}
      REFERENCE_REPO: ${{ vars.WORLDSMITH_REFERENCE_REPO }}

    steps:
      - name: Permission gate (admin/write/maintain only)
        run: |
          set -euo pipefail
          ROLE=$(gh api "/repos/${{ github.repository }}/collaborators/${ACTOR}/permission" -q .permission)
          echo "Sender ${ACTOR} role: ${ROLE}"
          case "$ROLE" in
            admin|write|maintain) ;;
            *) echo "::error::sender '${ACTOR}' lacks write permission (role=${ROLE})"; exit 1 ;;
          esac

      - name: Assert reference repo configured
        run: |
          if [ -z "${REFERENCE_REPO:-}" ]; then
            echo "::error::repo variable WORLDSMITH_REFERENCE_REPO is not set"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint issue scope
        id: lint
        env:
          REF_REPO: ${{ env.REFERENCE_REPO }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --json body -q .body > /tmp/issue_body.md
          set +e
          python tooling/check_issue_scope.py < /tmp/issue_body.md > /tmp/lint_verdict.json
          LINT_CODE=$?
          set -e
          echo "verdict_code=${LINT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Linter verdict (exit ${LINT_CODE}):"
          cat /tmp/lint_verdict.json
          if [ "$LINT_CODE" = "1" ]; then
            {
              echo "**Issue rejected by \`tooling/check_issue_scope.py\`** before any token spend:"
              echo
              jq -r '.hard[] | "- " + .' /tmp/lint_verdict.json
              if [ "$(jq '.soft | length' /tmp/lint_verdict.json)" != "0" ]; then
                echo
                echo "Soft warnings that would also have been raised:"
                jq -r '.soft[] | "- " + .' /tmp/lint_verdict.json
              fi
              echo
              echo "After addressing, re-apply the \`agent:run\` label."
            } > /tmp/lint_comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/lint_comment.md
            gh issue edit "$ISSUE_NUMBER" --remove-label "agent:run" --add-label "agent:failed"
          elif [ "$LINT_CODE" = "2" ]; then
            {
              echo "**Soft warnings from \`tooling/check_issue_scope.py\`** (proceeding):"
              echo
              jq -r '.soft[] | "- " + .' /tmp/lint_verdict.json
            } > /tmp/lint_comment.md
            gh issue comment "$ISSUE_NUMBER" --body-file /tmp/lint_comment.md
          fi

      - name: Block if lint hard-rejected
        if: steps.lint.outputs.verdict_code == '1'
        run: |
          echo "::error::Linter hard-rejected this issue (see issue comment)."
          exit 1

      - name: Install Claude CLI
        run: |
          set -e
          # `claude.ai/install.sh` (native installer) regressed: it downloads
          # the binary, runs its `install` subcommand which silently fails to
          # place the launcher anywhere, and then `rm -f`s the download — so
          # nothing ends up on disk. npm install lands the same CLI via the
          # standard package mechanism, bypassing the broken native flow.
          sudo npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Assert OAUTH secret is present
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is empty."
            exit 1
          fi

      - name: Clone reference corpus
        run: |
          set -euo pipefail
          # Wipe any pre-existing reference content (defense-in-depth) but
          # preserve the gitignored README/.gitignore stubs by re-checkout.
          find reference -mindepth 1 ! -name '.gitignore' ! -name 'README.md' -exec rm -rf {} + 2>/dev/null || true
          git clone --depth=1 "$REFERENCE_REPO" reference/.cloned
          # Move clone contents into reference/ (preserving stubs).
          shopt -s dotglob nullglob
          for entry in reference/.cloned/*; do
            name=$(basename "$entry")
            [ "$name" = ".git" ] && continue
            mv "$entry" "reference/$name"
          done
          rm -rf reference/.cloned
          if [ -z "$(find reference -mindepth 1 ! -name '.gitignore' ! -name 'README.md')" ]; then
            echo "::error::reference clone yielded no source files"
            exit 1
          fi

      - name: Build scope from issue body
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh issue view "$ISSUE_NUMBER" --json title,body \
            -q '"# " + .title + "\n\n" + .body' > artifacts/issue_scope.md

      - name: Sanitize issue scope
        # Hygiene pass before the issue body reaches an LLM prompt: caps the
        # body to 4096 bytes and replaces ` and ~~~ with safe surrogates.
        # NOT a security boundary; the actual injection mitigation is the
        # Bash removal from Extractor's PHASE_TOOLS in
        # tooling/orchestrator_run.py. See tooling/sanitize_scope.py.
        run: python tooling/sanitize_scope.py artifacts/issue_scope.md

      - name: Export scope to job output
        id: scope
        run: |
          set -euo pipefail
          echo "Issue scope (truncated):"
          head -c 1000 artifacts/issue_scope.md
          echo
          {
            echo 'scope<<__WS_EOS__'
            cat artifacts/issue_scope.md
            echo '__WS_EOS__'
          } >> "$GITHUB_OUTPUT"

      - name: Extractor phase
        id: extractor
        env:
          SCOPE: ${{ steps.scope.outputs.scope }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python tooling/orchestrator_run.py \
            --phase extractor --mode release \
            --scope "$SCOPE" \
            --usage-jsonl artifacts/usage.jsonl \
            --transcript artifacts/extractor.transcript.json
          if grep -q 'EXTRACTOR_BLOCKED:' artifacts/extractor.transcript.json 2>/dev/null; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "::error::Extractor returned EXTRACTOR_BLOCKED — see transcript"
            exit 1
          fi

      - name: Sanitization gate on changed knowledge
        run: |
          set -euo pipefail
          CHANGED=$(git status --porcelain knowledge/ | awk '{print $2}' | grep -E '\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "Running sanitization on:"
            echo "$CHANGED"
            python tooling/check_sanitization.py $CHANGED
          else
            echo "No knowledge/*.md changes from Extractor — skipping sanitization gate."
          fi

      - name: Validate specs (post-extractor)
        run: python tooling/validate_specs.py --verbose

      - name: Architect phase
        env:
          SCOPE: ${{ steps.scope.outputs.scope }}
        run: |
          set -euo pipefail
          python tooling/orchestrator_run.py \
            --phase architect --mode release \
            --scope "$SCOPE" \
            --usage-jsonl artifacts/usage.jsonl \
            --transcript artifacts/architect.transcript.json

      - name: Validate specs (post-architect)
        run: python tooling/validate_specs.py --verbose

      - name: Wipe reference (defense-in-depth)
        if: always()
        run: |
          find reference -mindepth 1 ! -name '.gitignore' ! -name 'README.md' -exec rm -rf {} + 2>/dev/null || true

      - name: Commit, push, open PR
        id: pr
        env:
          # Override the job-wide GH_TOKEN (which is GITHUB_TOKEN by default) with
          # a fine-grained PAT for THIS step only. Reason: events triggered by
          # GITHUB_TOKEN do not start downstream workflows (GitHub recursion guard),
          # so a bot-created PR would never trigger pr.yml. Using a PAT makes the
          # `pull_request: opened` event "real" and pr.yml fires automatically.
          GH_TOKEN: ${{ secrets.WORLDSMITH_AGENT_PAT }}
          WORLDSMITH_AGENT_PAT: ${{ secrets.WORLDSMITH_AGENT_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${WORLDSMITH_AGENT_PAT:-}" ]; then
            echo "::error::WORLDSMITH_AGENT_PAT repo secret is empty — agent-intake cannot create a PR that triggers pr.yml. Add the secret and re-apply agent:run."
            exit 1
          fi
          # Author identity is Claude — the actual code-producing entity (Extractor
          # + Architect phases). Push identity comes from the PAT in the remote URL.
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git checkout -B "$BRANCH"
          # Add only paths the agents are supposed to influence.
          git add specs knowledge ir tooling/agents
          if git diff --cached --quiet; then
            echo "No spec/knowledge/ir/agent changes produced; skipping PR."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p artifacts
          git diff --cached > artifacts/agent_changes.diff
          git commit -m "agent: refresh from issue #${ISSUE_NUMBER}" \
                     -m "Generated by Extractor + Architect (run #${{ github.run_id }}). See artifacts/usage.jsonl."
          # Push via URL-embedded PAT instead of extraheader. actions/checkout@v4
          # already configured an extraheader for github.token (basic auth); a
          # bearer-auth override didn't take for git push (GitHub's git-over-HTTPS
          # canonically uses basic auth with x-access-token). The URL-embed pattern
          # is what `gh` itself uses internally; auto log redaction masks the token.
          # `--force` rather than `--force-with-lease`: this branch is owned
          # exclusively by agent-intake (per CLAUDE.md "re-applying agent:run
          # re-runs and force-pushes onto the same branch"), no concurrent writer
          # to protect against, and we never fetched `origin/$BRANCH` so a lease
          # comparison would have no baseline.
          REMOTE_PAT_URL="https://x-access-token:${WORLDSMITH_AGENT_PAT}@github.com/${{ github.repository }}.git"
          git push "$REMOTE_PAT_URL" "$BRANCH" --force
          BODY="Closes #${ISSUE_NUMBER}

          Generated by \`agent-intake.yml\` run [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          Issue scope, usage stats, and the unified diff are attached as workflow artifacts."
          if PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --draft \
              --title "agent: refresh from issue #${ISSUE_NUMBER}" \
              --body "$BODY" 2>&1); then
            echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::gh pr create failed: $PR_URL"
            echo "url=https://github.com/${{ github.repository }}/tree/${BRANCH}" >> "$GITHUB_OUTPUT"
            echo "created=branch-only" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on issue (success)
        if: success()
        run: |
          set -euo pipefail
          case "${{ steps.pr.outputs.created }}" in
            true)
              gh issue comment "$ISSUE_NUMBER" --body "Agent run finished. PR: ${{ steps.pr.outputs.url }}"
              gh issue edit "$ISSUE_NUMBER" --remove-label "agent:run" --add-label "agent:in-pr" || true
              ;;
            branch-only)
              gh issue comment "$ISSUE_NUMBER" --body "Agent run finished, but \`gh pr create\` failed. Branch: ${{ steps.pr.outputs.url }}"
              gh issue edit "$ISSUE_NUMBER" --remove-label "agent:run" --add-label "agent:in-pr" || true
              ;;
            false)
              gh issue comment "$ISSUE_NUMBER" --body "Agent run produced no spec/knowledge/ir changes — nothing to PR."
              gh issue edit "$ISSUE_NUMBER" --remove-label "agent:run" || true
              ;;
          esac

      - name: Comment on issue (failure)
        # Skip when the linter already commented + relabeled — avoids a
        # duplicate "Agent run failed" message on top of the structured
        # rejection from `tooling/check_issue_scope.py`.
        if: failure() && steps.lint.outputs.verdict_code != '1'
        run: |
          REASON="failed at a step. See run https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "${{ steps.extractor.outputs.blocked }}" = "true" ]; then
            REASON="EXTRACTOR_BLOCKED — reference clone yielded no extractable code"
          fi
          gh issue comment "$ISSUE_NUMBER" --body "Agent run failed: ${REASON}" || true
          gh issue edit "$ISSUE_NUMBER" --remove-label "agent:run" --add-label "agent:failed" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-intake-issue-${{ github.event.issue.number }}-run-${{ github.run_id }}
          path: |
            artifacts/usage.jsonl
            artifacts/agent_changes.diff
            artifacts/issue_scope.md
            artifacts/extractor.transcript.json
            artifacts/architect.transcript.json
            work/
          if-no-files-found: warn
          retention-days: 14
