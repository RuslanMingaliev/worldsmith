name: Release (full regen → draft GitHub release)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 2026.02"
        required: true
        type: string
      publish:
        description: "Publish a draft GitHub release; set false to skip and only upload artifacts"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ github.actor == 'RuslanMingaliev' }}

    outputs:
      target_ref: ${{ steps.drift.outputs.target_ref }}

    env:
      WORLDSMITH_MAX_TOKENS_PER_RUN: ${{ vars.WORLDSMITH_MAX_TOKENS_PER_RUN }}

    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]{4}\.[0-9]+(-[A-Za-z0-9._-]+)?$'; then
            echo "::error::version='$VERSION' does not match yyyy.NN[-suffix] (suffix: alnum, dot, underscore, dash)."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Pre-flight — assert reference is empty
        run: |
          set -e
          if [ -d reference ]; then
            extra=$(find reference -mindepth 1 ! -name '.gitignore' ! -name 'README.md')
            if [ -n "$extra" ]; then
              echo "::error::reference/ contains non-template files; release flow refuses to run with reference present."
              echo "$extra"
              exit 1
            fi
          fi

      - name: Pre-flight validate specs
        run: python tooling/validate_specs.py --verbose

      - name: Install Claude CLI
        run: |
          set -e
          # See pr.yml — claude.ai/install.sh native installer is currently
          # broken. npm install bypasses it.
          sudo npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run pipeline
        env:
          # Bills the operator's claude.ai Pro/Max subscription. Generated locally via
          # `claude setup-token` and stored as a repository secret.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -e
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repo secret is empty."
            exit 1
          fi
          mkdir -p artifacts
          python tooling/orchestrator_run.py --mode release --phase architect
          python tooling/orchestrator_run.py --mode release --phase coder
          python tooling/orchestrator_run.py --mode release --phase reconciler
          python tooling/orchestrator_run.py --mode release --phase postmortem

      - name: Post-flight validate (catch accidental knowledge writes)
        run: python tooling/validate_specs.py --verbose

      - name: Capture spec/agent drift as a PR
        id: drift
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -e
          # Watch only paths that the agents are supposed to influence. generated/
          # and artifacts/ are gitignored. work/ is gitignored too.
          WATCHED="specs ir knowledge tooling/agents"
          if git diff --quiet HEAD -- $WATCHED; then
            echo "No drift detected; release will tag the trigger commit ${TRIGGER_SHA}."
            echo "target_ref=${TRIGGER_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="release-${VERSION}-reflect-changes"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A $WATCHED
          git commit -m "release ${VERSION}: reflect agent-generated changes" \
                     -m "Captured during release.yml run #${{ github.run_id }}."
          git push -u origin "$BRANCH"
          # PR creation is best-effort: if the repo setting blocks it, log a
          # warning and continue. The branch is already pushed, so the operator
          # can open a PR by hand. We still emit target_ref so the release job
          # tags the right commit.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release ${VERSION}: reflect agent-generated changes" \
            --body "Spec / IR / knowledge / agent-prompt drift captured during the release.yml run.

          Release tag \`${VERSION}\` points at this branch's HEAD; merging brings main back in sync with what the release was built from.

          See workflow artifacts \`generation-${VERSION}\` for per-phase reports." \
            --draft; then
            echo "::warning::PR creation failed (often: 'Allow GitHub Actions to create and approve pull requests' is off in repo settings). Branch ${BRANCH} is pushed; create the PR manually."
          fi
          echo "target_ref=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upload generation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-${{ inputs.version }}
          path: |
            generated/
            artifacts/
          retention-days: 14

  build:
    needs: generate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            bin: game
            ext: ""
          - platform: macos-aarch64
            os: macos-latest
            archive: tar.gz
            bin: game
            ext: ""
          - platform: windows-x86_64
            os: windows-latest
            archive: zip
            bin: game.exe
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    if: ${{ github.actor == 'RuslanMingaliev' }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.target_ref }}

      - name: Download generation artifacts
        uses: actions/download-artifact@v4
        with:
          name: generation-${{ inputs.version }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release --manifest-path generated/game/Cargo.toml

      - name: Run unit + autopilot tests
        run: cargo test --release --manifest-path generated/game/Cargo.toml

      - name: Package binary archive (Unix)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ inputs.version }}
          PLATFORM: ${{ matrix.platform }}
          BIN: ${{ matrix.bin }}
        shell: bash
        run: |
          set -e
          STAGE="worldsmith-game-${VERSION}-${PLATFORM}"
          mkdir -p "$STAGE" assets
          cp "generated/game/target/release/$BIN" "$STAGE/worldsmith"
          [ -f generated/game/README.md ] && cp generated/game/README.md "$STAGE/README.md" || true
          [ -f LICENSE ] && cp LICENSE "$STAGE/LICENSE" || true
          tar -czf "assets/$STAGE.tar.gz" "$STAGE"

      - name: Package binary archive (Windows)
        if: runner.os == 'Windows'
        env:
          VERSION: ${{ inputs.version }}
          PLATFORM: ${{ matrix.platform }}
          BIN: ${{ matrix.bin }}
        shell: pwsh
        run: |
          $stage = "worldsmith-game-$env:VERSION-$env:PLATFORM"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          New-Item -ItemType Directory -Force -Path "assets" | Out-Null
          Copy-Item "generated/game/target/release/$env:BIN" "$stage/worldsmith.exe"
          if (Test-Path "generated/game/README.md") { Copy-Item "generated/game/README.md" "$stage/README.md" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$stage/LICENSE" }
          Compress-Archive -Path $stage -DestinationPath "assets/$stage.zip"

      - name: Upload platform asset
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: assets/
          retention-days: 14

  release:
    needs: [generate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.actor == 'RuslanMingaliev' }}

    steps:
      - name: Checkout target ref (drift branch or trigger SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.target_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install system packages (xvfb, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y xvfb ffmpeg

      - name: Install Claude CLI (for release_editor phase)
        run: |
          set -e
          # See pr.yml — claude.ai/install.sh is broken; npm install bypasses.
          sudo npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Download generation artifacts
        uses: actions/download-artifact@v4
        with:
          name: generation-${{ inputs.version }}

      - name: Download platform builds
        uses: actions/download-artifact@v4
        with:
          path: assets-staging
          pattern: build-*
          merge-multiple: true

      - name: Stage platform tarballs into assets/
        run: |
          mkdir -p assets
          mv assets-staging/* assets/
          ls -la assets/

      - name: Record demo (linux only)
        run: |
          mkdir -p release
          xvfb-run -a tooling/record_autopilot.sh tests/level/local_chase_obstacle.yaml release/demo.gif

      - name: Package src zip + demo GIF
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          python tooling/package_release.py --version "$VERSION"
          mv "artifacts/worldsmith-game-${VERSION}-src.zip" \
             "assets/worldsmith-game-${VERSION}-src.zip"
          cp release/demo.gif "assets/worldsmith-${VERSION}-gameplay.gif"

      - name: Build manifest
        run: |
          python - <<'PY'
          import json, subprocess, datetime, pathlib, yaml
          repo = pathlib.Path('.')
          modules = yaml.safe_load((repo / 'ir' / 'module_plan.yaml').read_text())['modules']
          src_dir = repo / 'generated' / 'game' / 'src'
          loc = sum(1 for f in src_dir.rglob('*.rs') for _ in f.read_text(encoding='utf-8').splitlines())
          rustc = subprocess.run(['rustc', '--version'], capture_output=True, text=True).stdout.strip()
          manifest = {
              'module_count': str(len(modules)),
              'loc': f'{loc:,}',
              'test_summary': 'See workflow logs for test counts.',
              'rustc_version': rustc,
              'generated_at': datetime.datetime.utcnow().strftime('%Y-%m-%d'),
          }
          (repo / 'artifacts').mkdir(exist_ok=True)
          (repo / 'artifacts' / 'manifest.json').write_text(json.dumps(manifest, indent=2))
          print(manifest)
          PY

      - name: Determine previous release tag
        id: prev_tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -e
          # Pick the most recent existing release tag (excluding the version
          # being created right now, in case a previous attempt left a draft).
          PREV=$(gh release list --exclude-drafts --limit 5 \
                  --json tagName --jq ".[] | select(.tagName != \"$VERSION\") | .tagName" \
                  | head -n1)
          if [ -z "$PREV" ]; then
            # Fallback: nearest annotated tag in git history excluding HEAD itself.
            PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          fi
          echo "Previous release tag: ${PREV:-(none)}"
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Author release narrative (hero pitch + what's new prose)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          set -e
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set; skipping release_editor (release notes will use fallback placeholders)."
            exit 0
          fi
          if [ -z "${PREV_TAG:-}" ]; then
            echo "::warning::Could not determine previous release tag; release_editor will use git fallback."
          fi
          # The agent reads previous_tag/current_tag from the scope override.
          # Failure here is non-fatal (fallback placeholders ship in compose).
          python tooling/orchestrator_run.py \
            --mode release \
            --phase release_editor \
            --scope "previous_tag: ${PREV_TAG:-(unknown)}; current_tag: ${VERSION}" \
            || echo "::warning::release_editor phase failed; release notes will use fallback placeholders."

      - name: Compose release notes
        env:
          VERSION: ${{ inputs.version }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          python tooling/compose_release_notes.py \
            --version "$VERSION" \
            --prev-version "${PREV_TAG:-unknown}" \
            --usage-jsonl artifacts/usage.jsonl \
            --postmortem artifacts/postmortem.md \
            --manifest artifacts/manifest.json \
            --release-hero artifacts/release_hero.md \
            --release-whatsnew artifacts/release_whatsnew.md \
            --assets-dir assets \
            --out artifacts/release-notes.md

      - name: Upload release assets bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.version }}
          path: |
            assets/
            artifacts/release-notes.md
            artifacts/manifest.json
            artifacts/usage.jsonl
            artifacts/postmortem.md
          retention-days: 30

      - name: Publish draft GitHub release
        if: ${{ inputs.publish == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          TARGET_REF: ${{ needs.generate.outputs.target_ref }}
        run: |
          set -e
          gh release create "$VERSION" \
            --draft \
            --target "$TARGET_REF" \
            --title "Worldsmith $VERSION" \
            --notes-file artifacts/release-notes.md \
            assets/*
